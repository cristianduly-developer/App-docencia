// ═══════════════════════════════════════════════════════════════
// SECCION: EOE — Equipo de Orientacion Escolar
// Cada miembro pertenece a una escuela y tiene rol, dias de
// presencia, telefono y mail. Son los aliados institucionales
// de Aye dentro de cada escuela.
// ═══════════════════════════════════════════════════════════════
function SecEOE({ escuelas, onSaveEOE }) {
  const [escId, setEscId]   = useState(escuelas.filter(e=>!e.eliminado)[0]?.id||"");
  const [modo, setModo]     = useState(null);
  const [form, setForm]     = useState(null);
  const [conf, setConf]     = useState(null);
  const set = (k,v) => setForm(p => ({...p,[k]:v}));

  const esc    = escuelas.find(e=>e.id===escId);
  const eoe    = (esc?.eoe||[]).filter(m=>!m.eliminado);
  const ROLES  = ["Orientadora Educacional","Orientadora Social","Orientadora de los Aprendizajes","Psicologa/o","Fonoaudiologa/o","Psicopedagoga/o"];

  const guardar = () => {
    if(!form||!form.nombre||!form.rol) return;
    const escNew = {...esc};
    const eoeArr = [...(escNew.eoe||[])];
    const idx    = eoeArr.findIndex(m=>m.id===form.id);
    if(idx>=0) eoeArr[idx] = form;
    else eoeArr.push({...form, id:"eoe"+Math.random().toString(36).slice(2,7), eliminado:false});
    escNew.eoe = eoeArr;
    onSaveEOE(escNew);
    setModo(null); setForm(null);
  };

  const guardar_done = true; // guardar defined above

  const eliminar = (id) => {
    const escNew = {...esc, eoe:(esc.eoe||[]).map(m=>m.id===id?{...m,eliminado:true}:m)};
    onSaveEOE(escNew);
    setConf(null);
  };

  if(modo) return (
    <div>
      <button onClick={()=>{setModo(null);setForm(null);}}
        style={{background:"none",border:"none",cursor:"pointer",color:G,fontWeight:700,fontSize:14,padding:0,marginBottom:16,fontFamily:"inherit"}}>
        Cancelar
      </button>
      <div style={{fontSize:20,fontWeight:800,color:TX,marginBottom:20}}>
        {modo==="nuevo"?"Nuevo miembro del EOE":"Editar miembro"}
      </div>
      <Card>
        <Fld label="Nombre completo" value={form.nombre} onChange={v=>set("nombre",v)} req placeholder="Lic. Apellido, Nombre"/>
        <Sel label="Rol" value={form.rol} onChange={v=>set("rol",v)} req
          opts={ROLES.map(r=>({v:r,l:r}))} ph="Seleccionar rol..."/>
        <Fld label="Dias de presencia" value={form.diasPresencia} onChange={v=>set("diasPresencia",v)} placeholder="Lunes y Miercoles"/>
        <Fld label="Telefono" value={form.telefono} onChange={v=>set("telefono",v)} placeholder="11-xxxx-xxxx"/>
        <Fld label="Mail" value={form.mail} onChange={v=>set("mail",v)} placeholder="nombre@escuela.edu.ar"/>
      </Card>
      <div style={{display:"flex",gap:10}}>
        <Btn full outline onClick={()=>{setModo(null);setForm(null);}} color={GR}>Cancelar</Btn>
        <Btn full color={G} disabled={!form||!form.nombre||!form.rol} onClick={guardar}>
          {modo==="nuevo"?"Agregar al EOE":"Guardar cambios"}
        </Btn>
      </div>
    </div>
  );

  return (
    <div>
      {conf && <Confirm
        msg={"Eliminar a "+((esc?.eoe||[]).find(m=>m.id===conf)?.nombre||"este miembro")+" del EOE?"}
        onOk={()=>eliminar(conf)} onNo={()=>setConf(null)}/>}

      <SecT text="Equipo de Orientacion Escolar"/>
      <div style={{fontSize:13,color:GR,marginBottom:14,lineHeight:1.5}}>
        Los profesionales del EOE son los aliados institucionales de Aye dentro de cada escuela.
        Ante cualquier inconveniente con docentes o directivos, son el canal de resolucion.
      </div>

      {/* Selector de escuela */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {escuelas.filter(e=>!e.eliminado&&e.activo!==false).map(e=>(
          <button key={e.id} onClick={()=>setEscId(e.id)}
            style={{padding:"7px 14px",borderRadius:20,border:"2px solid",
              borderColor:escId===e.id?e.color:BD,
              background:escId===e.id?e.color:"#fff",
              color:escId===e.id?"#fff":"#475569",
              fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
            {e.nivel}
          </button>
        ))}
      </div>

      {esc && (
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:14,color:TX}}>{esc.nombre}</div>
            <Btn small color={esc.color||G} onClick={()=>{
              setModo("nuevo");
              setForm({nombre:"",rol:"",diasPresencia:"",telefono:"",mail:""});
            }}>+ Agregar</Btn>
          </div>

          {eoe.length===0
            ? <Card sx={{textAlign:"center",padding:28}}>
                <div style={{fontSize:28,marginBottom:8}}>👥</div>
                <div style={{color:GR,fontSize:13}}>Sin miembros del EOE cargados para esta escuela.</div>
              </Card>
            : eoe.map(m=>(
                <Card key={m.id} sx={{borderLeft:"3px solid "+(esc.color||G)}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{width:40,height:40,borderRadius:"50%",
                      background:(esc.color||G)+"22",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:15,fontWeight:800,color:esc.color||G,flexShrink:0}}>
                      {m.nombre.split(" ").pop()[0]}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800,fontSize:14,color:TX}}>{m.nombre}</div>
                      <div style={{fontSize:12,color:esc.color||G,fontWeight:700,marginTop:1}}>{m.rol}</div>
                      {m.diasPresencia&&<div style={{fontSize:11,color:GL,marginTop:3}}>📅 {m.diasPresencia}</div>}
                      {m.telefono&&<div style={{fontSize:11,color:GL,marginTop:1}}>📞 {m.telefono}</div>}
                      {m.mail&&<div style={{fontSize:11,color:GL,marginTop:1}}>✉ {m.mail}</div>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      <Btn small outline color={esc.color||G}
                        onClick={()=>{setModo("editar");setForm({...m});}}>Editar</Btn>
                      <button onClick={()=>setConf(m.id)}
                        style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:15,padding:"2px 4px"}}>
                        🗑
                      </button>
                    </div>
                  </div>
                </Card>
              ))
          }
        </>
      )}
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════
// SECCIÓN: ALUMNOS — formulario completo
// Incluye datos personales, familia, salud, trayectoria,
// HORARIOS (con selector de docente) y PROFESIONALES asociados.
// ═══════════════════════════════════════════════════════════════
function SecAlumnos({ alumnos, escuelas, docentes, pros, onSave, onDelete, onToggleActivo, onVerFicha }) {
  const [modo, setModo] = useState(null);
  const [sel, setSel] = useState(null);
  const [conf, setConf]         = useState(null); // id a eliminar
  const [confArch, setConfArch] = useState(null); // id a archivar/reactivar
  const [filtroEsc, setFiltroEsc] = useState("");
  const [verInactivos, setVerInactivos] = useState(false);

  // Separamos activos e inactivos (inactivo = activo:false, no eliminado)
  const noEliminados = alumnos.filter(a => !a.eliminado);
  const activos   = noEliminados.filter(a => a.activo !== false);
  const inactivos = noEliminados.filter(a => a.activo === false);
  const base      = verInactivos ? inactivos : activos;
  const filtrados = filtroEsc ? base.filter(a => a.escuelaId === filtroEsc) : base;

  if (modo) return (
    <FormAlumno
      inicial={modo === "editar" ? sel : null}
      escuelas={escuelas}
      docentes={docentes}
      pros={pros}
      onSave={a => { onSave(a); setModo(null); setSel(null); }}
      onCancel={() => { setModo(null); setSel(null); }}
    />
  );

  return (
    <div>
      {conf && <Confirm
        msg={`¿Eliminar a ${alumnos.find(a=>a.id===conf)?.nombre}? Se conservarán sus registros históricos.`}
        onOk={() => { onDelete(conf); setConf(null); }}
        onNo={() => setConf(null)}
      />}
      {confArch && <Confirm
        msg={alumnos.find(a=>a.id===confArch)?.activo===false
          ? `¿Reactivar a ${alumnos.find(a=>a.id===confArch)?.nombre}? Va a volver a aparecer en el mapa del día y en todos los listados.`
          : `¿Archivar a ${alumnos.find(a=>a.id===confArch)?.nombre}? No va a aparecer en el mapa ni en los listados activos, pero sus datos e historial se conservan intactos.`}
        onOk={() => { onToggleActivo(confArch); setConfArch(null); }}
        onNo={() => setConfArch(null)}
      />}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <SecT text="Alumnos integrados" />
        <Btn small onClick={()=>setModo("nuevo")} color={G}>+ Nuevo alumno</Btn>
      </div>

      {/* Toggle activos / inactivos */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <button onClick={()=>setVerInactivos(false)} style={{flex:1,padding:"8px",borderRadius:10,border:"2px solid",borderColor:!verInactivos?G:BD,background:!verInactivos?G:"#fff",color:!verInactivos?"#fff":"#475569",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
          ✅ Activos ({activos.length})
        </button>
        <button onClick={()=>setVerInactivos(true)} style={{flex:1,padding:"8px",borderRadius:10,border:"2px solid",borderColor:verInactivos?"#94a3b8":BD,background:verInactivos?"#f1f5f9":"#fff",color:verInactivos?"#475569":"#94a3b8",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
          📦 Archivados ({inactivos.length})
        </button>
      </div>

      {/* Aviso contextual */}
      {verInactivos && (
        <div style={{background:"#f8fafc",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:GR,lineHeight:1.5}}>
          Los alumnos archivados no aparecen en el mapa ni en los listados activos. Sus registros e historial se conservan. Podés reactivarlos cuando retomen la integración.
        </div>
      )}
      {!verInactivos && activos.length > 0 && (
        <div style={{background:"#f0fdf4",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#166534",lineHeight:1.5}}>
          💡 Al fin del ciclo lectivo, archivá los alumnos que no continúan. Los que sigan el año próximo los reactivás desde la pestaña "Archivados" y actualizás su escuela y curso.
        </div>
      )}

      {/* Filtro por escuela */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={()=>setFiltroEsc("")} style={{padding:"5px 12px",borderRadius:20,border:"2px solid",borderColor:!filtroEsc?G:BD,background:!filtroEsc?G:"#fff",color:!filtroEsc?"#fff":"#475569",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Todas</button>
        {escuelas.filter(e=>!e.eliminado).map(e =>
          <button key={e.id} onClick={()=>setFiltroEsc(e.id)} style={{padding:"5px 12px",borderRadius:20,border:"2px solid",borderColor:filtroEsc===e.id?e.color:BD,background:filtroEsc===e.id?e.color:"#fff",color:filtroEsc===e.id?"#fff":"#475569",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{e.nivel}</button>
        )}
      </div>

      {filtrados.length === 0
        ? <Card sx={{textAlign:"center",padding:32}}>
            <div style={{fontSize:32,marginBottom:8}}>{verInactivos?"📦":"👤"}</div>
            <div style={{color:GR}}>{verInactivos?"Sin alumnos archivados":"Sin alumnos activos"}</div>
          </Card>
        : filtrados.map(a => {
            const esc   = escuelas.find(e=>e.id===a.escuelaId);
            const color = esc?.color||G;
            const inact = a.activo === false;
            const cud   = a.cud && a.cudVencimiento
              ? Math.round((new Date(a.cudVencimiento) - new Date("2026-06-01")) / 864e5)
              : null;
            return (
              <Card key={a.id} onClick={()=>onVerFicha&&onVerFicha(a)} sx={{borderLeft:`4px solid ${inact?"#cbd5e0":color}`,opacity:inact?.75:1,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                  <div style={{width:48,height:48,borderRadius:"50%",background:inact?"#f1f5f9":color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:inact?GL:color,flexShrink:0}}>
                    {a.nombre.split(" ").map(p=>p[0]).slice(0,2).join("")}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{fontWeight:800,fontSize:16}}>{a.nombre}</div>
                      {inact&&<span style={{background:"#f1f5f9",color:GR,borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:700}}>ARCHIVADO</span>}
                    </div>
                    <div style={{fontSize:13,color:"#475569",marginTop:2}}>{a.curso} · {esc?.nombre}</div>
                    <div style={{fontSize:12,color:GL,marginTop:2}}>{a.diagnostico}</div>
                    <div style={{fontSize:11,color:GL,marginTop:4}}>
                      📅 {a.horarios?.length||0} bloques · 🔬 {a.profesionalIds?.length||0} profesionales
                    </div>
                    {cud!==null&&cud<180&&(
                      <div style={{fontSize:11,fontWeight:700,color:cud<0?"#dc2626":"#f59e0b",marginTop:4}}>
                        {cud<0?"⚠ CUD VENCIDO":`⚠ CUD vence en ${cud} días`}
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                    <Btn small outline onClick={(e)=>{e.stopPropagation();setFichaAlu(a);}} color={inact?GR:color}>Ver ficha</Btn>
                    {/* Toggle activo/inactivo */}
                    <button onClick={(e)=>{e.stopPropagation();setConfArch(a.id);}}
                      style={{background:"none",border:`1.5px solid ${inact?G:"#94a3b8"}`,borderRadius:8,cursor:"pointer",color:inact?G:"#94a3b8",fontSize:11,fontWeight:700,padding:"3px 8px",fontFamily:"inherit"}}>
                      {inact?"▶ Reactivar":"⏸ Archivar"}
                    </button>
                    {/* Delete is only in the ficha view */}
                    <button onClick={()=>setConf(a.id)} style={{display:"none",fontSize:16,padding:"2px 4px"}}>🗑</button>
                  </div>
                </div>
              </Card>
            );
          })}
    </div>
  );
}

// ─── Formulario completo de alumno ────────────────────────────
// Este es el formulario más importante de la configuración.
// Tiene seis secciones: datos básicos, datos personales, salud,
// familia, trayectoria, HORARIOS y PROFESIONALES ASOCIADOS.
function FormAlumno({ inicial, escuelas, docentes, pros, onSave, onCancel }) {
  const ed = !!(inicial && inicial.id); // true = editar, false = nuevo alumno
  // Parse anio/division from existing curso for backwards compatibility
  const parseCurso = (c) => {
    if (!c) return {anio:"", division:""};
    const parts = c.trim().split(" ");
    return {anio: parts[0]||"", division: parts.slice(1).join(" ")||""};
  };
  const [f, sf] = useState(() => {
    const base = inicial || {
      nombre:"", escuelaId:"", curso:"", dni:"", fechaNacimiento:"",
      direccion:"", telefonoCasa:"", cud:false, cudNumero:"", cudVencimiento:"",
      diagnostico:"", obraSocial:"", nroAfiliado:"", medicacion:"",
      tutores:[{ nombre:"", relacion:"", telefono:"", principal:true }],
      terapias:[{ nombre:"", frecuencia:"", profesional:"" }],
      trayectoria:[{ ciclo:String(new Date().getFullYear()), institucion:"", nivel:"", notas:"" }],
      profesionalIds:[],
      horarios:[],
      eliminado:false,
    };
    const parsed = parseCurso(base.curso||"");
    return {
      ...base,
      anio: base.anio||parsed.anio,
      division: base.division||parsed.division,
      tutores: base.tutores || [{nombre:"",relacion:"",telefono:"",principal:true}],
      terapias: base.terapias || [{nombre:"",frecuencia:"",profesional:""}],
      trayectoria: base.trayectoria || [{ciclo:String(new Date().getFullYear()),institucion:"",nivel:"",notas:""}],
      profesionalIds: base.profesionalIds || [],
      horarios: base.horarios || [],
    };
  });

  const set = (k,v) => sf(p => ({...p, [k]:v}));

  // Tutores
  const setT = (i,k,v) => sf(p => ({...p, tutores:p.tutores.map((t,ti)=>ti===i?{...t,[k]:v}:t)}));
  const addT = () => sf(p => ({...p, tutores:[...p.tutores,{nombre:"",relacion:"",telefono:"",principal:false}]}));
  const delT = i => sf(p => ({...p, tutores:p.tutores.filter((_,ti)=>ti!==i)}));

  // Terapias
  const setTer = (i,k,v) => sf(p => ({...p, terapias:p.terapias.map((t,ti)=>ti===i?{...t,[k]:v}:t)}));
  const addTer = () => sf(p => ({...p, terapias:[...p.terapias,{nombre:"",frecuencia:"",profesional:""}]}));
  const delTer = i => sf(p => ({...p, terapias:p.terapias.filter((_,ti)=>ti!==i)}));

  // Trayectoria
  const setTr = (i,k,v) => sf(p => ({...p, trayectoria:p.trayectoria.map((t,ti)=>ti===i?{...t,[k]:v}:t)}));
  const addTr = () => sf(p => ({...p, trayectoria:[{ciclo:"",institucion:"",nivel:"",notas:""},...p.trayectoria]}));
  const delTr = i => sf(p => ({...p, trayectoria:p.trayectoria.filter((_,ti)=>ti!==i)}));

  // Profesionales externos — toggle de selección múltiple
  const togglePro = id => sf(p => ({
    ...p,
    profesionalIds: p.profesionalIds.includes(id)
      ? p.profesionalIds.filter(x => x !== id)
      : [...p.profesionalIds, id]
  }));

  const prosActivos = pros.filter(p => !p.eliminado);
  const ok = !!(f.nombre && f.escuelaId);

  return (
    <div>
      <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",color:G,fontWeight:700,fontSize:14,padding:0,marginBottom:16,fontFamily:"inherit"}}>← Cancelar</button>
      <div style={{fontSize:20,fontWeight:800,color:TX,marginBottom:20}}>{ed?"Editar alumno":"Nuevo alumno"}</div>

      {/* ── 1. Datos básicos ── */}
      <Card>
        <SecT text="Datos básicos" />
        <Fld label="Nombre completo" value={f.nombre} onChange={v=>set("nombre",v)} req placeholder="Apellido, Nombre" />
        <Sel label="Institución" value={f.escuelaId} onChange={v=>set("escuelaId",v)} req
          opts={escuelas.filter(e=>!e.eliminado).map(e=>({v:e.id,l:e.nombre}))} ph="Seleccionar..." />
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:6}}>Año / Grado <span style={{color:"#dc2626"}}>*</span></div>
            <select value={f.anio||""} onChange={e=>set("anio",e.target.value)}
              style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:10,padding:"10px 14px",fontSize:14,fontFamily:"inherit",background:"#f8fafc",color:f.anio?TX:"#94a3b8",boxSizing:"border-box"}}>
              <option value="">-</option>
              {["1°","2°","3°","4°","5°","6°","7°"].map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:6}}>División</div>
            <select value={f.division||""} onChange={e=>set("division",e.target.value)}
              style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:10,padding:"10px 14px",fontSize:14,fontFamily:"inherit",background:"#f8fafc",color:f.division?TX:"#94a3b8",boxSizing:"border-box"}}>
              <option value="">-</option>
              {["A","B","C","D","E","F","1ra","2da","3ra"].map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
        </div>
        {/* curso sigue existiendo como campo compuesto para compatibilidad */}
        <Fld label="Diagnóstico" value={f.diagnostico} onChange={v=>set("diagnostico",v)} req placeholder="Ej: TEA Nivel 1" />
      </Card>

      {/* ── 2. Datos personales ── */}
      <Card>
        <SecT text="Datos personales" />
        <Fld label="DNI" value={f.dni} onChange={v=>set("dni",v)} placeholder="00.000.000" />
        <Fld label="Fecha de nacimiento" value={f.fechaNacimiento} onChange={v=>set("fechaNacimiento",v)} type="date" />
        <Fld label="Dirección" value={f.direccion} onChange={v=>set("direccion",v)} placeholder="Calle, número, piso" />
        <Fld label="Teléfono de casa" value={f.telefonoCasa} onChange={v=>set("telefonoCasa",v)} placeholder="011-xxxx-xxxx" />
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:8}}>CUD</div>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
            <input type="checkbox" checked={f.cud} onChange={e=>set("cud",e.target.checked)} style={{width:18,height:18}} />
            <span style={{fontSize:14,fontWeight:600}}>Tiene Certificado Único de Discapacidad</span>
          </label>
        </div>
        {f.cud && <>
          <Fld label="Número de CUD" value={f.cudNumero} onChange={v=>set("cudNumero",v)} placeholder="CUD-XXXX-XXXXX" />
          <Fld label="Fecha de vencimiento" value={f.cudVencimiento} onChange={v=>set("cudVencimiento",v)} type="date" />
        </>}
      </Card>

      {/* ── 3. Salud ── */}
      <Card>
        <SecT text="Salud" />
        <Fld label="Obra Social" value={f.obraSocial} onChange={v=>set("obraSocial",v)} placeholder="OSDE, IOMA..." />
        <Fld label="N° de Afiliado" value={f.nroAfiliado} onChange={v=>set("nroAfiliado",v)} />
        <Fld label="Medicación" value={f.medicacion} onChange={v=>set("medicacion",v)} multiline placeholder="Medicación, dosis y horario de toma" />
      </Card>

      {/* ── 4. Familia y contactos ── */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <SecT text="Familia y contactos" />
          <Btn small outline onClick={addT} color={G}>+ Agregar</Btn>
        </div>
        {f.tutores.map((t,i) => (
          <div key={i} style={{borderBottom:`1px solid ${BD}`,paddingBottom:14,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:14,color:TX}}>Tutor {i+1}</div>
              {f.tutores.length > 1 && <button onClick={()=>delT(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:16,padding:0}}>🗑</button>}
            </div>
            <Fld label="Nombre completo" value={t.nombre} onChange={v=>setT(i,"nombre",v)} placeholder="Apellido, Nombre" />
            <Fld label="Relación" value={t.relacion} onChange={v=>setT(i,"relacion",v)} placeholder="Mamá, Papá, Tutor..." />
            <Fld label="Teléfono" value={t.telefono} onChange={v=>setT(i,"telefono",v)} placeholder="11-xxxx-xxxx" />
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
              <input type="checkbox" checked={t.principal} onChange={e=>setT(i,"principal",e.target.checked)} style={{width:16,height:16}} />
              <span style={{fontSize:13,fontWeight:600}}>Contacto principal</span>
            </label>
          </div>
        ))}
      </Card>

      {/* ── 5. Terapias ── */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <SecT text="Terapias actuales" />
          <Btn small outline onClick={addTer} color={G}>+ Agregar</Btn>
        </div>
        {f.terapias.map((t,i) => (
          <div key={i} style={{borderBottom:`1px solid ${BD}`,paddingBottom:14,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:14}}>Terapia {i+1}</div>
              <button onClick={()=>delTer(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:16,padding:0}}>🗑</button>
            </div>
            <Fld label="Tipo" value={t.nombre} onChange={v=>setTer(i,"nombre",v)} placeholder="Fonoaudiología, Psicología..." />
            <Fld label="Frecuencia" value={t.frecuencia} onChange={v=>setTer(i,"frecuencia",v)} placeholder="2 veces por semana" />
            <Fld label="Profesional" value={t.profesional} onChange={v=>setTer(i,"profesional",v)} placeholder="Lic. Nombre Apellido" />
          </div>
        ))}
      </Card>

      {/* ── 6. Trayectoria escolar ── */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <SecT text="Trayectoria escolar" />
          <Btn small outline onClick={addTr} color={G}>+ Agregar</Btn>
        </div>
        {f.trayectoria.map((t,i) => (
          <div key={i} style={{borderBottom:`1px solid ${BD}`,paddingBottom:14,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:14}}>{t.ciclo || `Entrada ${i+1}`}</div>
              <button onClick={()=>delTr(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:16,padding:0}}>🗑</button>
            </div>
            <Fld label="Ciclo lectivo" value={t.ciclo} onChange={v=>setTr(i,"ciclo",v)} placeholder="2024" />
            <Fld label="Institución" value={t.institucion} onChange={v=>setTr(i,"institucion",v)} placeholder="Escuela N°..." />
            <Fld label="Nivel / Grado" value={t.nivel} onChange={v=>setTr(i,"nivel",v)} placeholder="3° grado, 1° año..." />
            <Fld label="Notas" value={t.notas} onChange={v=>setTr(i,"notas",v)} multiline placeholder="Observaciones del período..." />
          </div>
        ))}
      </Card>

      {/* ── 7. PROFESIONALES EXTERNOS ASOCIADOS ─────────────────
           Aquí se resuelve la relación alumno ↔ profesional.
           Se muestran todos los profesionales cargados en el
           sistema y Aye tilda los que trabajan con este alumno.
           Los tildados aparecerán en la ficha del alumno con
           su contacto de WhatsApp.
      ─────────────────────────────────────────────────────── */}
      <Card>
        <SecT text="Profesionales externos asociados" />
        <div style={{fontSize:13,color:GR,marginBottom:16}}>
          Seleccioná los profesionales que trabajan con este alumno fuera de la escuela. Aparecerán en su ficha con contacto de WhatsApp.
        </div>
        {prosActivos.length === 0 ? (
          <div style={{fontSize:13,color:GL,fontStyle:"italic"}}>No hay profesionales cargados en el sistema todavía. Podés agregarlos desde la sección "Profesionales externos".</div>
        ) : prosActivos.map(p => {
            const seleccionado = f.profesionalIds.includes(p.id);
            return (
              <div key={p.id} onClick={()=>togglePro(p.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,marginBottom:8,cursor:"pointer",background:seleccionado?"#f0fdf4":"#f8fafc",border:`2px solid ${seleccionado?G:BD}`,transition:"all .15s"}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:seleccionado?G:BD,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:"#fff",flexShrink:0,transition:"background .15s"}}>
                  {seleccionado?"✓":p.nombre.split(" ").pop()[0]}
                </div>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:TX}}>{p.nombre}</div>
                  <div style={{fontSize:12,color:GR,marginTop:2}}>{p.rol}{p.telefono?` · ${p.telefono}`:""}</div>
                </div>
              </div>
            );
          })}
      </Card>

      {/* Botones finales */}
      <div style={{display:"flex",gap:10,paddingBottom:24}}>
        <Btn full outline onClick={onCancel} color={GR}>Cancelar</Btn>
        <Btn full onClick={()=>ok&&onSave(ed?f:{...f,id:"a"+uid(),eliminado:false})} disabled={!ok} color={G}>
          {ed?"Guardar cambios":"Crear alumno"}
        </Btn>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP PRINCIPAL DE CONFIGURACIÓN
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// SECCION: CIERRE DE CICLO LECTIVO
// Permite archivar en lote todos los alumnos activos al fin
// del anio, limpiar horarios, y preparar la app para el ciclo
// siguiente. Los datos e historial se conservan intactos.
// ═══════════════════════════════════════════════════════════════
function CierreCiclo({ alumnos, onArchivarTodos, onCerrar }) {
  const [paso, setPaso]   = useState("confirm"); // confirm | procesando | listo
  const [ciclo, setCiclo] = useState(new Date().getFullYear().toString());
  const activos = alumnos.filter(a=>!a.eliminado&&a.activo!==false);

  const ejecutar = () => {
    setPaso("procesando");
    setTimeout(()=>{
      onArchivarTodos(ciclo);
      setPaso("listo");
    }, 1200);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:24}}>
      <div style={{background:"#fff",borderRadius:20,padding:28,maxWidth:380,width:"100%",
        boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>

        {paso==="confirm" && <>
          <div style={{fontSize:36,textAlign:"center",marginBottom:12}}>📅</div>
          <div style={{fontWeight:800,fontSize:18,color:"#1a202c",textAlign:"center",marginBottom:8}}>
            Cerrar ciclo lectivo
          </div>
          <div style={{fontSize:14,color:"#64748b",textAlign:"center",lineHeight:1.6,marginBottom:20}}>
            Esto va a archivar los <strong>{activos.length} alumnos activos</strong> del ciclo <strong>{ciclo}</strong>.
            Sus datos, registros e historial se conservan intactos.
            El anio proximo los reactivas uno a uno y actualizas escuela y curso.
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:6}}>
              Ciclo que cierra
            </div>
            <input value={ciclo} onChange={e=>setCiclo(e.target.value)}
              style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:10,
                padding:"10px 14px",fontSize:14,fontFamily:"inherit",
                boxSizing:"border-box",outline:"none"}}/>
          </div>
          <div style={{background:"#fef2f2",borderRadius:10,padding:"10px 14px",
            marginBottom:20,fontSize:12,color:"#991b1b",fontWeight:600,lineHeight:1.5}}>
            Esta accion no se puede deshacer automaticamente.
            Cada alumno se podra reactivar manualmente desde la seccion Alumnos.
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn full outline onClick={onCerrar} color={"#64748b"}>Cancelar</Btn>
            <Btn full color={"#dc2626"} onClick={ejecutar}>
              Cerrar ciclo {ciclo}
            </Btn>
          </div>
        </>}

        {paso==="procesando" && (
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:48,marginBottom:16}}>⏳</div>
            <div style={{fontWeight:800,fontSize:16,color:"#1a202c",marginBottom:8}}>Cerrando ciclo...</div>
            <div style={{fontSize:13,color:"#64748b"}}>Archivando {activos.length} alumnos</div>
          </div>
        )}

        {paso==="listo" && (
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:16}}>✅</div>
            <div style={{fontWeight:800,fontSize:18,color:"#1a202c",marginBottom:8}}>
              Ciclo {ciclo} cerrado
            </div>
            <div style={{fontSize:14,color:"#64748b",lineHeight:1.6,marginBottom:20}}>
              Se archivaron <strong>{activos.length} alumnos</strong>.
              El anio proximo vas a la seccion Alumnos, filtrás por Archivados, y reactivás
              los que continuan con sus nuevos datos.
            </div>
            <Btn full color={"#2D6A4F"} onClick={onCerrar}>Listo</Btn>
          </div>
        )}

      </div>
    </div>
  );
}

// AYE — MÓDULO DE DOCUMENTOS
// Gestiona los tres documentos oficiales del ciclo lectivo:
// 1. PPI (Propuesta Pedagógica de Inclusión) — Marzo/Mayo
// 2. Informe de Medio Año — Julio/Agosto
// 3. Informe Final Anual — Noviembre (con calificaciones)
//
// Lee los datos de alumnos, docentes y escuelas desde
// localStorage (guardados por aye-config y aye-app).
// Guarda el contenido de los documentos también en localStorage.
// ═══════════════════════════════════════════════════════════════

// ─── Colores ──────────────────────────────────────────────────

// ─── Helpers ──────────────────────────────────────────────────
const ciclo  = () => new Date().getFullYear().toString();

// ─── UI Primitivos del módulo Docs (usa Card, SecT del módulo App) ─
const TA=({value,onChange,placeholder,rows=4})=>(
  <textarea value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:10,padding:"10px 14px",fontSize:13,fontFamily:"inherit",color:TX,background:"#f8fafc",boxSizing:"border-box",outline:"none",resize:"vertical",minHeight:rows*24,lineHeight:1.6}}/>
);
const Input=({value,onChange,placeholder})=>(
  <input value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:8,padding:"8px 10px",fontSize:13,fontFamily:"inherit",color:TX,background:"#f8fafc",boxSizing:"border-box",outline:"none"}}/>
);

// ─── CSS compartido para los PDFs ────────────────────────────
const CSS_DOC=`*{margin:0;padding:0;box-sizing:border-box}body{font-family:Georgia,serif;font-size:12pt;color:#1a202c;line-height:1.6}.pag{width:210mm;min-height:297mm;margin:0 auto;padding:18mm 20mm 20mm}.enc{display:flex;align-items:center;gap:18px;padding-bottom:16px;border-bottom:3px solid #2D6A4F;margin-bottom:24px}.logo{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#2D6A4F,#40916c);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22pt;font-weight:800;flex-shrink:0}h1{font-size:18pt;font-weight:800;line-height:1.1}.cargo{font-size:11pt;color:#2D6A4F;font-weight:600;margin-top:4px;text-transform:uppercase}.titulo{font-size:15pt;font-weight:800;margin-bottom:20px;padding-bottom:8px;border-bottom:1px solid #e2e8f0;color:#2D6A4F}.datos-enc{background:#f8fafc;border-left:4px solid #2D6A4F;padding:14px;margin-bottom:20px;border-radius:4px;display:grid;grid-template-columns:1fr 1fr;gap:8px 24px}.dl{font-size:9pt;color:#64748b;text-transform:uppercase;font-weight:700;display:block;margin-bottom:2px}.dv{font-size:11pt;font-weight:600}.campo{background:#f8fafc;border-left:4px solid #2D6A4F;padding:12px 14px;border-radius:4px;margin-bottom:14px;break-inside:avoid}.campo-lbl{font-size:9pt;color:#64748b;text-transform:uppercase;font-weight:700;margin-bottom:6px;letter-spacing:.3px}.campo-val{font-size:11pt;white-space:pre-wrap;line-height:1.7}.subtit{font-size:12pt;font-weight:800;margin:18px 0 10px;text-transform:uppercase;color:#1a202c;border-bottom:1px solid #e2e8f0;padding-bottom:4px}.tabla{width:100%;border-collapse:collapse;margin-top:10px}.tabla th{background:#2D6A4F;color:#fff;padding:8px 10px;font-size:10pt;text-align:left}.tabla td{padding:8px 10px;border-bottom:1px solid #e2e8f0;font-size:10pt}.tabla tr:nth-child(even) td{background:#f8fafc}.firmas{display:grid;grid-template-columns:repeat(3,1fr);gap:20px 16px;margin-top:40px;padding-top:20px;border-top:1px solid #e2e8f0}.firma-blq{text-align:center}.firma-lin{border-top:1px solid #1a202c;margin-bottom:6px}.firma-nom{font-size:9pt;font-weight:700}.firma-rol{font-size:8pt;color:#64748b}.fecha-em{font-size:9pt;color:#94a3b8;text-align:right;margin-top:16px}@media print{@page{margin:0;size:A4}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}`;


// ═══════════════════════════════════════════════════════════════
// EDITOR PPI
// ═══════════════════════════════════════════════════════════════
function EditorPPI({ alumno, docentes, escuela, d, setD, generando, onGenerar }) {
  const ec = escuela?.color||G;
  const docsA = [...new Set((alumno.horarios||[]).filter(h=>h.docenteId).map(h=>h.docenteId))]
    .map(id=>docentes.find(x=>x.id===id)).filter(Boolean);

  const exportarPDF = () => {
    const mediEsp = docsA.map(doc=>`
      <div class="campo"><div class="campo-lbl">${doc.materia} — ${doc.nombre}</div>
      <div class="campo-val">${d[`mediEsp_${doc.id}`]||"A completar."}</div></div>`).join("");

    const firmas = `<div class="firmas">
      <div class="firma-blq"><div class="firma-lin"></div><div class="firma-nom">${NOMBRE_DOCENTE}</div><div class="firma-rol">Docente de la Modalidad Especial</div></div>
      <div class="firma-blq"><div class="firma-lin"></div><div class="firma-nom">${escuela?.director||"Director/a"}</div><div class="firma-rol">Dirección</div></div>
      <div class="firma-blq"><div class="firma-lin"></div><div class="firma-nom">EOE</div><div class="firma-rol">Equipo de Orientación</div></div>
      ${docsA.map(doc=>`<div class="firma-blq"><div class="firma-lin"></div><div class="firma-nom">${doc.nombre}</div><div class="firma-rol">${doc.materia}</div></div>`).join("")}
      <div class="firma-blq"><div class="firma-lin"></div><div class="firma-nom">Familia / Tutor/a</div><div class="firma-rol">Responsable</div></div>
    </div>
    <div class="fecha-em">Emitido el ${hoyFmt()}</div>`;

    const datosEnc = `<div class="datos-enc">
      <div style="grid-column:1/-1"><span class="dl">Estudiante</span><span class="dv">${alumno.nombre}</span></div>
      <div><span class="dl">DNI</span><span class="dv">${alumno.dni||"—"}</span></div>
      <div><span class="dl">Fecha de nacimiento</span><span class="dv">${alumno.fechaNacimiento?fmtF(alumno.fechaNacimiento):"—"}</span></div>
      <div><span class="dl">Curso</span><span class="dv">${alumno.curso}</span></div>
      <div><span class="dl">Institución</span><span class="dv">${escuela?.nombre||"—"}</span></div>
      <div><span class="dl">Ciclo lectivo</span><span class="dv">${ciclo()}</span></div>
    </div>`;

    const cssPPI = CSS_BASE+`.pag{padding:18mm 22mm 20mm}.titulo{font-size:16pt;font-weight:800;color:#1a202c;margin:18px 0 14px;padding-bottom:10px;border-bottom:2px solid ${ec}}.subtit{font-size:13pt;font-weight:700;color:${ec};margin:18px 0 10px}.datos-enc{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 18px;margin-bottom:18px;font-size:10pt}.dl{font-weight:700;color:#64748b;margin-right:6px}.dv{color:#1a202c}.campo{margin-bottom:14px;page-break-inside:avoid}.campo-lbl{font-size:10pt;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}.campo-val{font-size:11pt;color:#1a202c;line-height:1.7;background:#f8fafc;border-left:3px solid ${ec};padding:10px 14px;border-radius:0 8px 8px 0;white-space:pre-wrap;text-align:justify;hyphens:auto}.firmas{display:flex;flex-wrap:wrap;gap:24px 40px;margin-top:36px;padding-top:20px;border-top:2px solid #e2e8f0}.firma-blq{text-align:center;min-width:140px}.firma-lin{width:160px;border-top:1.5px solid #1a202c;margin:0 auto 6px}.firma-nom{font-size:10pt;font-weight:700;color:#1a202c}.firma-rol{font-size:9pt;color:#64748b;margin-top:2px}.fecha-em{font-size:9pt;color:#94a3b8;text-align:right;margin-top:16px}`;
    const htmlPPI = `<div class="pag">${ENC_HTML()}<div class="titulo">Propuesta Pedagógica de Inclusión — ${ciclo()}</div>${datosEnc}<div class="campo"><div class="campo-lbl">Situación de aprendizaje actual</div><div class="campo-val">${d.situacionActual||"A completar."}</div></div><div class="campo"><div class="campo-lbl">Propósitos</div><div class="campo-val">${d.propositos||"A completar."}</div></div><div class="campo"><div class="campo-lbl">Mediaciones generales</div><div class="campo-val">${d.mediGenerales||"A completar."}</div></div><div class="subtit">Mediaciones específicas por materia</div>${mediEsp}<div class="campo"><div class="campo-lbl">Objetivos de evaluación</div><div class="campo-val">${d.objetivosEval||"A completar."}</div></div><div class="campo"><div class="campo-lbl">Criterios de evaluación</div><div class="campo-val">${d.criteriosEval||"A completar."}</div></div>${firmas}</div>`;
    abrirPDF(`PPI — ${alumno.nombre}`, cssPPI, htmlPPI);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><div style={{fontWeight:800,fontSize:16,color:TX}}>Propuesta Pedagógica de Inclusión</div>
          <div style={{fontSize:12,color:GR,marginTop:2}}>Ciclo {ciclo()} · Completá cada sección y exportá como PDF</div></div>
        <button onClick={exportarPDF} style={{background:ec,color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>📄 Exportar PDF</button>
      </div>

      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <SecT text="Situación de aprendizaje actual"/>
          <button onClick={()=>onGenerar("ppi")} disabled={!!generando} style={{background:ec+"18",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,color:ec,cursor:"pointer",fontFamily:"inherit"}}>
            {generando==="ppi"?"⏳ Generando...":"✨ Generar con Claude"}
          </button>
        </div>
        <TA value={d.situacionActual} onChange={v=>setD("situacionActual",v)} placeholder="Describí el punto de partida del estudiante desde sus fortalezas y los facilitadores del contexto..." rows={5}/>
      </Card>

      <Card>
        <SecT text="Propósitos"/>
        <TA value={d.propositos} onChange={v=>setD("propositos",v)} placeholder="Objetivos generales de la integración para este ciclo lectivo..." rows={4}/>
      </Card>

      <Card>
        <SecT text="Mediaciones generales"/>
        <div style={{fontSize:11,color:GR,marginBottom:8}}>Ajustes razonables que aplican a todas las materias.</div>
        <TA value={d.mediGenerales} onChange={v=>setD("mediGenerales",v)} placeholder="Tiempo extendido, material adaptado, ubicación en el aula, consignas reformuladas..." rows={4}/>

// ── Gestión del session token ─────────────────────────────────
// Se guarda en sessionStorage: sobrevive recargas pero no cierre de tab
const SESSION_KEY = "aye_session_token";

function getSessionToken() {
  return window._sessionToken || sessionStorage.getItem(SESSION_KEY) || null;
}
function setSessionToken(token) {
  window._sessionToken = token;
  if (token) sessionStorage.setItem(SESSION_KEY, token);
  else sessionStorage.removeItem(SESSION_KEY);
}
// Restaurar al cargar la página
setSessionToken(sessionStorage.getItem(SESSION_KEY));

// Helper para headers autenticados
const authHeaders = (extra={}) => ({
  "Content-Type": "application/json",
  ...(getSessionToken() ? { "x-session-token": getSessionToken() } : {}),
  ...extra,
});

// Si un request devuelve 401, disparar evento para que App haga logout limpio
let _logout401 = false; // evita disparar múltiples veces en paralelo
function manejar401() {
  if (_logout401) return;
  _logout401 = true;
  setSessionToken(null);
  localStorage.removeItem("aye_sesion");
  window.dispatchEvent(new CustomEvent('aye:sesion-expirada'));
  setTimeout(() => { _logout401 = false; }, 3000);
}

const DB = {
  async save(tabla, obj) {
    try {
      const res = await fetch("/api/db/"+tabla, {method:"POST",
        headers: authHeaders(), body:JSON.stringify(obj)});
      if(res.status===401) { manejar401(); return; }
      if(!res.ok) { const err = await res.json().catch(()=>({})); console.error(`[DB.save] ${tabla} 500:`, err?.error||res.status); }
    } catch(e) { console.error(`[DB.save] ${tabla} fetch error:`, e.message); }
    // localStorage como fallback (sin datos sensibles de alumnos)
    if (!["alumnos"].includes(tabla)) {
      try {
        const arr = JSON.parse(localStorage.getItem("aye_"+tabla)||"[]");
        const idx = arr.findIndex(x=>x.id===obj.id);
        if(idx>=0) arr[idx]=obj; else arr.push(obj);
        localStorage.setItem("aye_"+tabla, JSON.stringify(arr));
      } catch(e) {}
    }
  },
  async loadRegistrosAlumno(alumnoId) {
    // Carga el historial completo de un alumno específico bajo demanda
    try {
      const res = await fetch(`/api/db/registros?alumno_id=${alumnoId}`, { headers: authHeaders() });
      if(res.status===401) { manejar401(); return []; }
      if(res.ok) {
        const remoto = await res.json();
        return (remoto||[]).filter(r=>!r.eliminado);
      }
    } catch(e) { console.error('[DB.loadRegistrosAlumno]', e.message); }
    return [];
  },
  async load(tabla, def=[], params={}) {
    try {
      // Para registros: cargar solo los últimos 60 días al inicio
      let url = "/api/db/"+tabla;
      if(tabla==="registros" && !params.completo) {
        const desde = new Date(); desde.setDate(desde.getDate()-60);
        url += "?desde="+desde.toISOString().slice(0,10);
      }
      const res = await fetch(url, { headers: authHeaders() });
      if(res.status===401) { manejar401(); return def; }
      if(res.ok) {
        const remoto = await res.json();
        if(remoto&&remoto.length>0) {

          // ── Registros: Supabase devuelve array plano, app necesita diccionario ──
          if(tabla==="registros") {
            const dictRemoto = {};
            remoto.forEach(r=>{ const aId=r.aluId; if(aId){if(!dictRemoto[aId])dictRemoto[aId]=[];dictRemoto[aId].push(r);} });
            const local = (()=>{ try{return JSON.parse(localStorage.getItem("aye_registros")||"{}");}catch{return {};} })();
            const merged = {...local};
            Object.entries(dictRemoto).forEach(([aId,regs])=>{
              const localRegs = merged[aId]||[];
              const remIds = new Set(regs.map(r=>r.id));
              merged[aId] = [...regs, ...localRegs.filter(r=>!remIds.has(r.id))];
            });
            localStorage.setItem("aye_registros", JSON.stringify(merged));
            return merged;
          }

          // ── Resto de tablas: merge por id ──────────────────────────────────────
          const local = (()=>{ try{return JSON.parse(localStorage.getItem("aye_"+tabla)||"[]");}catch{return [];} })();
          const supaIds = new Set(remoto.map(x=>String(x.id)));
          const soloLocales = local.filter(x=>!supaIds.has(String(x.id)));
          const merged = [
            ...remoto.map(sup=>{ const loc=local.find(l=>String(l.id)===String(sup.id)); return loc?{...loc,...sup}:sup; }),
            ...soloLocales
          ];
          localStorage.setItem("aye_"+tabla, JSON.stringify(merged));
          soloLocales.forEach(item=>{
            fetch("/api/db/"+tabla,{method:"POST",headers:authHeaders(),body:JSON.stringify(item)}).catch(()=>{});
          });
          return merged;
        }
      }
    } catch(e) {}
    try { return JSON.parse(localStorage.getItem("aye_"+tabla)||"null") || def; }
    catch(e) { return def; }
  }
};

function App() {
  const [usuario, setUsuario] = useState(()=>{
    const u = leer("aye_sesion", null);
    if (!u) return null;
    // El acceso ya fue verificado server-side al hacer login.
    // Solo verificamos que haya session token válido en esta pestaña.
    if (!getSessionToken()) return null;
    if (u.nombre) NOMBRE_DOCENTE = u.nombre; // restaurar nombre al recargar
    if (u.plan)   PLAN_DOCENTE   = u.plan;
    return u;
  });
  const login  = u => {
    setUsuario(u);
    grabar("aye_sesion", u);
    localStorage.setItem("aye_last_activity", Date.now());
    if (u && u.nombre) NOMBRE_DOCENTE = u.nombre; // actualizar para informes y PDFs
    if (u && u.plan)   PLAN_DOCENTE   = u.plan;
  };
  const logout = () => {
    setUsuario(null);
    setSessionToken(null); // limpia sessionStorage y window._sessionToken
    localStorage.removeItem("aye_sesion");
    localStorage.removeItem("aye_last_activity");
    if (window.google) window.google.accounts.id.disableAutoSelect();
  };

  // Escuchar sesión expirada desde DB (401)
  useEffect(() => {
    const handler = () => logout();
    window.addEventListener('aye:sesion-expirada', handler);
    return () => window.removeEventListener('aye:sesion-expirada', handler);
  }, []);

  // Auto-logout por inactividad (30 minutos)
  const INACTIVIDAD_MS = 30 * 60 * 1000;
  useEffect(() => {
    if (!usuario) return;
    const registrarActividad = () => localStorage.setItem("aye_last_activity", Date.now());
    const verificar = () => {
      const ultima = parseInt(localStorage.getItem("aye_last_activity")||"0");
      if (Date.now() - ultima > INACTIVIDAD_MS) logout();
    };
    // Registrar actividad en cualquier interacción
    ["click","touchstart","keydown"].forEach(ev => window.addEventListener(ev, registrarActividad));
    // Verificar cada minuto
    const timer = setInterval(verificar, 60000);
    return () => {
      ["click","touchstart","keydown"].forEach(ev => window.removeEventListener(ev, registrarActividad));
      clearInterval(timer);
    };
  }, [usuario]);

  // Datos maestros — se cargan desde Supabase con fallback a localStorage
  const [escuelas,  setEscuelas]  = useState(()=>leer("aye_escuelas",   ESC_DEF));
  const [docentes,  setDocentes]  = useState(()=>leer("aye_docentes",   DOC_DEF));
  const [pros,      setPros]      = useState(()=>leer("aye_profesionales", PRO_DEF));
  const [alumnos,   setAlumnos]   = useState(()=>leer("aye_alumnos",    ALU_DEF));
  const [registros, setRegistros] = useState(()=>leer("aye_registros",  REG_DEF));
  const [recs,      setRecs]      = useState(()=>leer("aye_avisos",     REC_I));

  // Normaliza un alumno para garantizar que los arrays sean arrays
  const normAlu = a => {
    const arr = f => Array.isArray(f) ? f : (f && typeof f==="string" ? (() => { try { return JSON.parse(f); } catch { return []; } })() : []);
    return {...a, horarios:arr(a.horarios), tutores:arr(a.tutores), terapias:arr(a.terapias), trayectoria:arr(a.trayectoria), profesionalIds:arr(a.profesionalIds)};
  };

  // Sincronizar con Supabase al iniciar
  useEffect(()=>{
    (async()=>{
      const [esc,doc,pro,alu,regs,avs] = await Promise.all([
        DB.load("escuelas",    ESC_DEF),
        DB.load("docentes",    DOC_DEF),
        DB.load("profesionales",PRO_DEF),
        DB.load("alumnos",     ALU_DEF),
        DB.load("registros",   REG_DEF),
        DB.load("avisos",      REC_DEF),
      ]);
      setEscuelas(esc); setDocentes(doc); setPros(pro); setAlumnos(alu.map(normAlu));
      setRegistros(regs); setRecs(avs);
    })();
  },[]);

  // Persistir cambios a Supabase + localStorage
  const saveEsc  = e => { setEscuelas(p=>p.find(x=>x.id===e.id)?p.map(x=>x.id===e.id?e:x):[...p,e]); DB.save("escuelas",e); };
  const saveDoc  = d => { setDocentes(p=>p.find(x=>x.id===d.id)?p.map(x=>x.id===d.id?d:x):[...p,d]); DB.save("docentes",d); };
  const savePro  = p => { setPros(prev=>prev.find(x=>x.id===p.id)?prev.map(x=>x.id===p.id?p:x):[...prev,p]); DB.save("profesionales",p); };
  const saveAlu  = a => { setAlumnos(p=>p.find(x=>x.id===a.id)?p.map(x=>x.id===a.id?a:x):[...p,a]); DB.save("alumnos",a); };
  const delAlu   = id=> { const upd={...alumnos.find(a=>a.id===id),eliminado:true}; setAlumnos(p=>p.map(a=>a.id===id?upd:a)); DB.save("alumnos",upd); };
  const archivarAlumnosEsc = (escId, ciclo, tambienDocentes) => {
    const updAlumnos = alumnos.map(a=>a.escuelaId===escId&&a.activo!==false?{...a,activo:false,cicloArchivado:ciclo}:a);
    setAlumnos(updAlumnos);
    updAlumnos.filter(a=>a.escuelaId===escId&&a.activo===false&&a.cicloArchivado===ciclo).forEach(a=>DB.save("alumnos",a));
    if(tambienDocentes){const updDocs=docentes.map(d=>d.escuelaId===escId?{...d,activo:false}:d);setDocentes(updDocs);updDocs.filter(d=>d.escuelaId===escId).forEach(d=>DB.save("docentes",d));}
  };
  const toggleActivoAlu = id => { const a=alumnos.find(x=>x.id===id); const upd={...a,activo:a.activo===false}; setAlumnos(p=>p.map(x=>x.id===id?upd:x)); DB.save("alumnos",upd); };
  const toggleActivoEsc = id => { const e=escuelas.find(x=>x.id===id); const upd={...e,activo:e.activo===false}; setEscuelas(p=>p.map(x=>x.id===id?upd:x)); DB.save("escuelas",upd); };
  const delEsc   = id=> { const upd={...escuelas.find(e=>e.id===id),eliminado:true}; setEscuelas(p=>p.map(e=>e.id===id?upd:e)); DB.save("escuelas",upd); };
  const delDoc   = id=> { const upd={...docentes.find(d=>d.id===id),eliminado:true}; setDocentes(p=>p.map(d=>d.id===id?upd:d)); DB.save("docentes",upd); };
  const delPro   = id=> { const upd={...pros.find(p=>p.id===id),eliminado:true}; setPros(p=>p.map(x=>x.id===id?upd:x)); DB.save("profesionales",upd); };

  useEffect(()=>{ grabar("aye_registros",registros); },[registros]);
  useEffect(()=>{ grabar("aye_avisos",recs); },[recs]);

  const addReg = (aId,reg) => { setRegistros(p=>({...p,[aId]:[reg,...(p[aId]||[])]})); DB.save("registros",{...reg,alumnoId:aId}); };
  const delReg = (aId,rId) => setRegistros(p=>{
    const upd={...p,[aId]:(p[aId]||[]).map(r=>r.id===rId?{...r,eliminado:true}:r)};
    const reg=upd[aId].find(r=>r.id===rId); if(reg) DB.save("registros",{...reg,alumnoId:aId});
    return upd;
  });
  const addRec = r => { setRecs(p=>[r,...p]); DB.save("avisos",r); };
  const delRec = id=> setRecs(p=>{ const upd=p.map(r=>r.id===id?{...r,eliminado:true}:r); const rec=upd.find(r=>r.id===id); if(rec) DB.save("avisos",rec); return upd; });

  // ── Control de asistencia por jornada completa ───────────────
  const marcarAusenciaTotalAlumno = (alumnoId, fecha) => {
    // Evitar duplicado si ya está marcado
    const yaAusente = (registros[alumnoId]||[]).some(r=>r.fecha===fecha&&r.tipo==="ausencia_total"&&!r.eliminado);
    if (yaAusente) return;
    const reg = { id:"reg_"+Date.now(), fecha, tipo:"ausencia_total",
      materia:"Asistencia General", asistencia:"ausente",
      avance:"Alumno ausente toda la jornada.", acuerdo:"", docente:"", eliminado:false };
    setRegistros(p=>({...p,[alumnoId]:[reg,...(p[alumnoId]||[])]}));
    DB.save("registros",{...reg,alumnoId});
  };

  const rehabilitarAlumnoTotal = (alumnoId, fecha) => {
    const reg = (registros[alumnoId]||[]).find(r=>r.fecha===fecha&&r.tipo==="ausencia_total"&&!r.eliminado);
    if (!reg) return;
    const upd = {...reg,eliminado:true};
    setRegistros(p=>({...p,[alumnoId]:p[alumnoId].map(r=>r.id===reg.id?upd:r)}));
    DB.save("registros",{...upd,alumnoId});
  };

  // ── Motor de alertas de ausentismo mensual ───────────────────
  const ausentismo = React.useMemo(() => {
    const hoyDate = new Date();
    const mes = hoyDate.getMonth();
    const anio = hoyDate.getFullYear();
    const faltasPorAlumno = {};
    const alertasSistemicas = [];
    alumnos.filter(a=>a.activo!==false&&!a.eliminado).forEach(alumno => {
      const faltas = (registros[alumno.id]||[]).filter(r => {
        if (r.eliminado||r.tipo!=="ausencia_total") return false;
        const f = new Date(r.fecha+"T00:00:00");
        return f.getMonth()===mes && f.getFullYear()===anio;
      }).length;
      faltasPorAlumno[alumno.id] = faltas;
      if (faltas>=5) alertasSistemicas.push({id:`alert_crit_${alumno.id}`,tipo:"critico",color:"rojo",
        texto:`🚨 ${alumno.nombre} registra ${faltas} inasistencias este mes. Preparar informe para EOE.`});
      else if (faltas>=3) alertasSistemicas.push({id:`alert_mod_${alumno.id}`,tipo:"riesgo_moderado",color:"amarillo",
        texto:`⚠️ ${alumno.nombre} acumuló ${faltas} inasistencias este mes. Realizar seguimiento.`});
    });
    return { faltasPorAlumno, alertasSistemicas };
  }, [alumnos, registros]);

  // Reloj en vivo
  const [ahora, setAhora] = useState(new Date());
  useEffect(()=>{ const t=setInterval(()=>setAhora(new Date()),60000); return()=>clearInterval(t); },[]);
  const DIA_REAL = ahora.getDay();
  const MIN      = ahora.getHours()*60+ahora.getMinutes();
  const FECHA_HOY = ahora.toLocaleDateString("es-AR",{day:"numeric",month:"long",year:"numeric"});

  // Navegación
  const [pant, setPant]             = useState("mapa");
  const [diaVista, setDiaVista]     = useState(DIA_REAL||1);
  const [aluSel, setAluSel]         = useState(null);
  const [evSel, setEvSel]           = useState(null);
  const [cfgSec, setCfgSec]         = useState("alumnos");
  const [fichaAlu, setFichaAlu]     = useState(null);
  const [editandoAlu, setEditandoAlu] = useState(null);
  const [forceMapaDia, setForceMapaDia] = useState(false);

  // Cargar historial completo de un alumno al abrir su ficha
  useEffect(()=>{
    if (!fichaAlu) return;
    DB.loadRegistrosAlumno(fichaAlu.id).then(regs => {
      if (regs.length > 0) {
        setRegistros(p => ({ ...p, [fichaAlu.id]: regs }));
      }
    });
  }, [fichaAlu?.id]);

  // Urgentes para badge
  const urgentes = recs.filter(r=>r.prioridad==="alta"&&!r.eliminado&&(!r.fecha||r.fecha===hoy())).length;

  // Handlers de Config
  const [guardadoCfg, setGuardadoCfg] = useState(false);
  const flash = () => { setGuardadoCfg(true); setTimeout(()=>setGuardadoCfg(false),2000); };

  // Menú usuario — debe estar ANTES del return condicional
  const [menuUsuario, setMenuUsuario] = useState(false);

  if(!usuario) return <PantallaLogin onLogin={login}/>;

  const esDemo = usuario?.acceso?.estado === 'demo';
  const diasDemo = usuario?.acceso?.diasRestantes ?? null;

  const NAV_BOTTOM = [
    {id:"alumnos",   icon:"👤",  label:"Alumnos"},
    {id:"directorio",icon:"🏫",  label:"Directorio"},
    {id:"mapa",      icon:"🗺",  label:"Mapa",     central:true},
    {id:"reportes",  icon:"📊",  label:"Reportes"},
    {id:"alertas",   icon:"🔔",  label:"Alertas",  badge:urgentes},
  ];

  const nombreCorto = (usuario?.nombre||"").split(" ")[0] || "Usuario";
  const iniciales   = (usuario?.nombre||"?").split(" ").map(w=>w[0]).slice(0,2).join("");

  return (
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",
      background:FO,fontFamily:"'Georgia',serif",display:"flex",flexDirection:"column"}}>

      {/* Banner demo */}
      {esDemo && (
        <div style={{background:"#f59e0b",color:"#1c1917",padding:"8px 16px",
          fontSize:13,fontFamily:"system-ui,sans-serif",textAlign:"center",
          display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <span>⏳</span>
          <span>
            <strong>Período de prueba</strong>
            {diasDemo !== null
              ? ` — ${diasDemo} día${diasDemo !== 1 ? 's' : ''} restante${diasDemo !== 1 ? 's' : ''}`
              : ''}
            . Contactá al administrador para activar tu cuenta.
          </span>
        </div>
      )}

      {/* Avatar flotante arriba a la derecha */}
      <div style={{position:"fixed",top:12,right:12,zIndex:500}}>
        <button onClick={()=>setMenuUsuario(m=>!m)}
          style={{background:"none",border:"none",cursor:"pointer",padding:0}}>
          <div style={{width:36,height:36,borderRadius:"50%",
            background:"linear-gradient(135deg,#2D6A4F,#40916c)",
            display:"flex",alignItems:"center",justifyContent:"center",
            overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,.2)",
            border:"2px solid #fff"}}>
            {usuario?.foto
              ? <img src={usuario.foto} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
              : <span style={{fontSize:13,fontWeight:800,color:"#fff"}}>{iniciales}</span>}
          </div>
        </button>
        {menuUsuario && (
          <div style={{position:"absolute",top:44,right:0,background:"#fff",
            borderRadius:14,boxShadow:"0 8px 32px rgba(0,0,0,.15)",
            border:"1px solid #e2e8f0",minWidth:180,overflow:"hidden",zIndex:501}}>
            <div style={{padding:"14px 16px 10px",borderBottom:"1px solid #f1f5f9"}}>
              <div style={{fontSize:13,fontWeight:800,color:TX}}>{usuario?.nombre||"Usuario"}</div>
              <div style={{fontSize:11,color:GR,marginTop:2}}>{usuario?.email||""}</div>
            </div>
            <button onClick={()=>{setMenuUsuario(false);setPant("miplan");}}
              style={{width:"100%",padding:"12px 16px",background:"none",border:"none",
                cursor:"pointer",display:"flex",alignItems:"center",gap:10,
                fontFamily:"inherit",color:TX,fontWeight:700,fontSize:13,textAlign:"left",
                borderBottom:"1px solid #f1f5f9"}}>
              <span style={{fontSize:16}}>⭐</span> Mi plan
            </button>
            <button onClick={()=>{
                setMenuUsuario(false);
                const tel = "542235767784";
                const msg = encodeURIComponent(`Hola! Soy ${usuario?.nombre||''} (${usuario?.email||''}), necesito ayuda con la app.`);
                window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
              }}
              style={{width:"100%",padding:"12px 16px",background:"none",border:"none",
                cursor:"pointer",display:"flex",alignItems:"center",gap:10,
                fontFamily:"inherit",color:TX,fontWeight:700,fontSize:13,textAlign:"left",
                borderBottom:"1px solid #f1f5f9"}}>
              <span style={{fontSize:16}}>💬</span> Contactar soporte
            </button>
            <button onClick={()=>{setMenuUsuario(false);logout();}}
              style={{width:"100%",padding:"12px 16px",background:"none",border:"none",
                cursor:"pointer",display:"flex",alignItems:"center",gap:10,
                fontFamily:"inherit",color:"#dc2626",fontWeight:700,fontSize:13,textAlign:"left"}}>
              <span style={{fontSize:16}}>🚪</span> Cerrar sesión
            </button>
          </div>
        )}
        {menuUsuario && <div onClick={()=>setMenuUsuario(false)}
          style={{position:"fixed",inset:0,zIndex:499}}/>}
      </div>

      {/* Contenido principal */}
      <div style={{flex:1,overflowY:"auto",paddingBottom:66}}>

        {/* MAPA */}
        {pant==="mapa" && <>
          {evSel
            ? <VistaClase ev={evSel} alumno={alumnos.find(a=>a.id===evSel.alumnoId)}
                docentes={docentes} escuelas={escuelas} registros={registros}
                recs={recs}
                onBack={()=>setEvSel(null)}
                onSaveReg={(aId,reg)=>{addReg(aId,reg);setEvSel(null);}}
                onAddReg={addReg}
                onAddRec={addRec}
                onFicha={id=>{setEvSel(null);setAluSel(alumnos.find(a=>a.id===id)||{id});setPant("alumnos");}}
              />
            : (DIA_REAL===0||DIA_REAL===6)&&!forceMapaDia
              ? <MapaFinde
                  alumnos={alumnos} docentes={docentes} escuelas={escuelas}
                  recs={recs} registros={registros} diaReal={DIA_REAL} fechaHoy={FECHA_HOY}
                  onVerMapa={()=>{setForceMapaDia(true);setDiaVista(1);}}
                />
              : (DIA_REAL>=1&&DIA_REAL<=5&&MIN>=18*60&&!forceMapaDia)
              ? <ResumenNocturno
                  alumnos={alumnos} docentes={docentes} escuelas={escuelas}
                  registros={registros} recs={recs}
                  diaReal={DIA_REAL} fechaHoy={FECHA_HOY}
                  onVerMapa={()=>setForceMapaDia(true)}
                />
              : <MapaDia
                  alumnos={alumnos} docentes={docentes} escuelas={escuelas}
                  registros={registros} recs={recs}
                  dia={diaVista} diaReal={DIA_REAL} minActual={MIN}
                  fechaHoy={FECHA_HOY}
                  onCambioDia={setDiaVista}
                  onVolverAHoy={(DIA_REAL===0||DIA_REAL===6||(DIA_REAL>=1&&DIA_REAL<=5&&MIN>=18*60))?()=>setForceMapaDia(false):undefined}
                  onVerClase={ev=>{setEvSel(ev);}}
                  onVerAlumno={id=>{setAluSel(alumnos.find(a=>a.id===id)||{id});setPant("alumnos");}}
                  onMarcarAusente={marcarAusenciaTotalAlumno}
                  onRehabilitarAlumno={rehabilitarAlumnoTotal}
                  ausentismo={ausentismo}
                />
          }
          {PLAN_DOCENTE !== 'basico'
            ? <CoPilot alumnos={alumnos} docentes={docentes} escuelas={escuelas} registros={registros} recs={recs}/>
            : <div style={{position:"fixed",bottom:24,right:24,zIndex:200}}>
                <button onClick={()=>alert('🔒 El Co-Piloto IA está disponible desde el plan Profesional.\n\nActualizá tu suscripción para acceder.')}
                  style={{width:56,height:56,borderRadius:"50%",background:"#94a3b8",border:"none",color:"#fff",fontSize:22,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,.2)"}}>
                  🔒
                </button>
              </div>
          }
          {/* FAB button - only shown when mapa is active and CoPilot closed */}
        </>}

        {/* DIRECTORIO — solo lectura */}
        {/* ALUMNOS — lista + ficha + edición */}
        {pant==="alumnos" && <>
          {editandoAlu
            ? <FormAlumno
                inicial={editandoAlu} escuelas={escuelas} docentes={docentes} pros={pros}
                onSave={a=>{
                  const {anio:_an,division:_dv,..._ar}=a; const aComp={..._ar,curso:[_an,_dv].filter(Boolean).join(" ")||_ar.curso};
                  saveAlu(aComp);flash();setEditandoAlu(null);
                }}
                onCancel={()=>setEditandoAlu(null)}
              />
            : aluSel
              ? <FichaAlumno
                  alumno={alumnos.find(a=>a.id===aluSel.id)||aluSel}
                  alumnos={alumnos} docentes={docentes} pros={pros}
                  escuelas={escuelas} registros={registros} recs={recs}
                  onBack={()=>setAluSel(null)}
                  onVerClase={ev=>{setEvSel(ev);setPant("mapa");}}
                  onAddRec={addRec}
                  onAddReg={addReg}
                  onDelReg={delReg}
                  onEditar={a=>{setEditandoAlu(a);}}
                  onToggleActivo={toggleActivoAlu}
                  onDelete={id=>{delAlu(id);setAluSel(null);}}
                  onSave={a=>{saveAlu(a);flash();}}
                />
              : <SecAlumnosPanel
                  alumnos={alumnos} escuelas={escuelas} docentes={docentes} pros={pros}
                  onVer={a=>{setAluSel(a);}}
                  onEditar={a=>{setEditandoAlu(a);}}
                  onNuevo={()=>{
                    const activos = alumnos.filter(a=>!a.eliminado&&a.activo!==false).length;
                    const limite = LIMITE_ALUMNOS[PLAN_DOCENTE] ?? 15;
                    if (activos >= limite) {
                      alert(`Tu plan ${PLAN_DOCENTE==='basico'?'Básico':PLAN_DOCENTE==='profesional'?'Profesional':'Premium'} permite hasta ${limite} alumnos activos.\n\nPara agregar más, actualizá tu suscripción.`);
                      return;
                    }
                    setEditandoAlu({nombre:"",escuelaId:"",activo:true,eliminado:false,horarios:[],tutores:[],terapias:[],profesionalIds:[]});
                  }}
                  onSave={a=>{const {anio:_an,division:_dv,..._ar}=a; const aComp={..._ar,curso:[_an,_dv].filter(Boolean).join(" ")||_ar.curso};saveAlu(aComp);}} onDelete={delAlu} onToggleActivo={toggleActivoAlu}
                />
          }
        </>}

        {/* DIRECTORIO — escuelas, docentes, profesionales */}
        {pant==="directorio" && <>
          <Directorio
            alumnos={alumnos} escuelas={escuelas} docentes={docentes} pros={pros}
            onVer={id=>{setAluSel(alumnos.find(a=>a.id===id)||{id});setPant("alumnos");}}
            saveEsc={e=>{saveEsc(e);flash();}}
            delEsc={id=>{delEsc(id);flash();}}
            saveDoc={d=>{saveDoc(d);flash();}}
            savePro={p=>{savePro(p);flash();}}
            delDoc={id=>{delDoc(id);flash();}}
            delPro={id=>{delPro(id);flash();}}
            toggleActivoEsc={id=>{toggleActivoEsc(id);flash();}}
            archivarAlumnosEsc={archivarAlumnosEsc}
          />
        </>}

        {/* REPORTES */}
        {pant==="reportes" && (
          <Reportes alumnos={alumnos} docentes={docentes} pros={pros} escuelas={escuelas}
            registros={registros} recs={recs}
            onVerAlumno={id=>{setAluSel(alumnos.find(a=>a.id===id)||{id});setPant("alumnos");}}/>
        )}

        {/* ALERTAS */}
        {pant==="alertas" && (
          <Avisos recs={recs} alumnos={alumnos}
            onAdd={addRec} onDel={delRec}/>
        )}

        {/* CONFIGURACIÓN */}
        {pant==="miplan" && (
          <div>
            <div style={{background:"linear-gradient(135deg,#1a202c,#2d3748)",padding:"16px 20px",color:"#fff",display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>setPant("mapa")} style={{background:"none",border:"none",color:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:20,padding:0,lineHeight:1}}>‹</button>
              <div style={{fontWeight:800,fontSize:18}}>⭐ Mi Plan</div>
            </div>
            <div style={{padding:"16px"}}>
              <MiPlan alumnos={alumnos}/>
            </div>
          </div>
        )}

        {pant==="config" && (
          <SecConfig
            seccion={cfgSec} onSeccion={setCfgSec}
            alumnos={alumnos} escuelas={escuelas} docentes={docentes} pros={pros}
            saveEsc={e=>{saveEsc(e);flash();}} saveDoc={d=>{saveDoc(d);flash();}}
            savePro={p=>{savePro(p);flash();}} saveAlu={a=>{const {anio:_an,division:_dv,..._ar}=a; const aComp={..._ar,curso:[_an,_dv].filter(Boolean).join(" ")||_ar.curso};saveAlu(aComp);flash();}}
            delDoc={id=>{delDoc(id);flash();}} delPro={id=>{delPro(id);flash();}} delAlu={delAlu}
            toggleActivoAlu={toggleActivoAlu} toggleActivoEsc={id=>{toggleActivoEsc(id);flash();}}
            onVerFicha={a=>{setAluSel(a);setPant("alumnos");}}
          />
        )}


      </div>

      {/* Bottom Navigation — único menú */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
        width:"100%",maxWidth:480,background:"#fff",borderTop:`1px solid ${BD}`,
        display:"flex",paddingBottom:"env(safe-area-inset-bottom,0px)",
        boxShadow:"0 -2px 12px rgba(0,0,0,.08)",zIndex:200}}>
        {NAV_BOTTOM.map(item=>(
          item.central
          ? <button key={item.id} onClick={()=>{setPant(item.id);setEvSel(null);setDiaVista(DIA_REAL||1);setForceMapaDia(false);}}
              style={{flex:1,background:"none",border:"none",cursor:"pointer",
                display:"flex",flexDirection:"column",alignItems:"center",
                gap:2,padding:"4px 2px 8px",fontFamily:"inherit",position:"relative"}}>
              <div style={{
                width:52,height:52,borderRadius:"50%",
                background:pant===item.id
                  ?"linear-gradient(135deg,#2D6A4F,#40916c)"
                  :"linear-gradient(135deg,#e2e8f0,#cbd5e0)",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:24,boxShadow:pant===item.id?"0 4px 16px rgba(45,106,79,.4)":"none",
                marginTop:-14,border:"3px solid #fff",
                transition:"all .2s"
              }}>{item.icon}</div>
              <span style={{fontSize:9,fontWeight:pant===item.id?800:600,
                color:pant===item.id?"#2D6A4F":"#94a3b8",
                textTransform:"uppercase",letterSpacing:.3,marginTop:2}}>{item.label}</span>
            </button>
          : <button key={item.id} onClick={()=>{
              setPant(item.id);
              if(item.id!=="alumnos") setAluSel(null);
              if(item.id!=="mapa") setEvSel(null);
            }}
              style={{flex:1,background:"none",border:"none",cursor:"pointer",
                display:"flex",flexDirection:"column",alignItems:"center",
                gap:2,padding:"8px 2px 10px",fontFamily:"inherit",
                borderTop:pant===item.id?"3px solid #2D6A4F":"3px solid transparent"}}>
              <div style={{position:"relative"}}>
                <span style={{fontSize:19,opacity:pant===item.id?1:.4}}>{item.icon}</span>
                {item.badge>0&&<div style={{position:"absolute",top:-5,right:-7,
                  background:"#dc2626",color:"#fff",borderRadius:"50%",
                  width:16,height:16,fontSize:9,fontWeight:800,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>{item.badge}</div>}
              </div>
              <span style={{fontSize:9,fontWeight:pant===item.id?800:600,
                color:pant===item.id?"#2D6A4F":"#94a3b8",
                textTransform:"uppercase",letterSpacing:.3}}>{item.label}</span>
            </button>
        ))}

      </div>
    </div>
  );
}

// ── SecConfig: shell de configuración ─────────────────────────
function MiPlan({alumnos}) {
  const plan = PLAN_DOCENTE || 'basico';
  const limite = LIMITE_ALUMNOS[plan] ?? 15;
  const activos = alumnos.filter(a=>!a.eliminado&&a.activo!==false).length;
  const pct = limite === Infinity ? 0 : Math.min(100, Math.round(activos/limite*100));
  const PLAN_META = {
    basico:      { label:'Básico',      color:'#6b7280', bg:'#f8fafc' },
    profesional: { label:'Profesional', color:'#4f46e5', bg:'#f5f3ff' },
    premium:     { label:'Premium',     color:'#d97706', bg:'#fffbeb' },
  };
  const meta = PLAN_META[plan] || PLAN_META.basico;
  return (
    <div style={{padding:"4px 0 24px"}}>
      {/* Tarjeta plan actual */}
      <div style={{background:meta.bg,border:`2px solid ${meta.color}`,borderRadius:16,padding:"18px 20px",marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:meta.color,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Tu plan actual</div>
        <div style={{fontSize:24,fontWeight:900,color:meta.color,marginBottom:12}}>{meta.label}</div>

        {/* Barra alumnos */}
        <div style={{marginBottom:4}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:700,color:"#1a202c",marginBottom:6}}>
            <span>👤 Alumnos activos</span>
            <span style={{color: activos >= limite ? '#dc2626' : meta.color}}>
              {activos} / {limite === Infinity ? '∞' : limite}
            </span>
          </div>
          {limite !== Infinity && (
            <div style={{background:"#e2e8f0",borderRadius:99,height:8,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",borderRadius:99,
                background: pct>=100?"#dc2626": pct>=80?"#f59e0b": meta.color,
                transition:"width .4s"}}/>
            </div>
          )}
        </div>
      </div>

      {/* Features del plan */}
      <div style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:14,padding:"16px 20px",marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",marginBottom:12}}>Incluido en tu plan</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:16}}>👤</span>
            <span style={{fontSize:13,fontWeight:600,color:"#1a202c"}}>
              {limite===Infinity ? "Alumnos ilimitados" : `Hasta ${limite} alumnos activos`}
            </span>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:16}}>{plan==='basico'?'🔒':'🤖'}</span>
            <span style={{fontSize:13,fontWeight:600,color: plan==='basico'?"#94a3b8":"#1a202c"}}>
              Co-Piloto IA {plan==='basico'?"(no incluido)":"incluido"}
            </span>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:16}}>📄</span>
            <span style={{fontSize:13,fontWeight:600,color:"#1a202c"}}>Informes y PDFs incluidos</span>
          </div>
        </div>
      </div>

      {plan === 'basico' && (
        <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:12,padding:"14px 16px",fontSize:13,color:"#1e40af",fontWeight:600,lineHeight:1.5}}>
          💡 Actualizá a <b>Profesional</b> para tener Co-Piloto IA y hasta 25 alumnos, o a <b>Premium</b> para alumnos ilimitados.
        </div>
      )}
      {plan === 'profesional' && (
        <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:12,padding:"14px 16px",fontSize:13,color:"#1e40af",fontWeight:600,lineHeight:1.5}}>
          💡 Actualizá a <b>Premium</b> para tener alumnos ilimitados.
        </div>
      )}
    </div>
  );
}

function SecConfig({seccion,onSeccion,escuelas,docentes,pros,alumnos,
  saveEsc,saveDoc,savePro,saveAlu,delDoc,delPro,delAlu,
  toggleActivoAlu,toggleActivoEsc,onVerFicha}) {

  const SECS = [
    {id:"alumnos",   icon:"👤", label:"Alumnos"},
    {id:"docentes",  icon:"👩‍🏫",label:"Docentes"},
    {id:"pros",      icon:"🔬", label:"Externos"},
    {id:"escuelas",  icon:"🏫", label:"Escuelas"},
  ];

  return (
    <div>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a202c,#2d3748)",padding:"16px 20px 0",color:"#fff"}}>
        <div style={{fontWeight:800,fontSize:18,marginBottom:12}}>⚙️ Configuración</div>
        <div style={{display:"flex",gap:0,borderBottom:"2px solid rgba(255,255,255,.1)"}}>
          {SECS.map(s=>(
            <button key={s.id} onClick={()=>onSeccion(s.id)} style={{
              flex:1,background:"none",border:"none",cursor:"pointer",
              display:"flex",flexDirection:"column",alignItems:"center",gap:3,
              padding:"8px 4px 10px",fontFamily:"inherit",
              borderBottom:seccion===s.id?"2px solid #40916c":"2px solid transparent",
              marginBottom:-2}}>
              <span style={{fontSize:18}}>{s.icon}</span>
              <span style={{fontSize:9,fontWeight:seccion===s.id?800:600,
                color:seccion===s.id?"#40916c":"rgba(255,255,255,.5)",
                textTransform:"uppercase",letterSpacing:.3}}>{s.label}</span>
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        {seccion==="plan"     && <MiPlan alumnos={alumnos}/>}
        {seccion==="alumnos"  && <SecAlumnos alumnos={alumnos} escuelas={escuelas} docentes={docentes} pros={pros}
          onSave={a=>{const {anio:_an,division:_dv,..._ar}=a; const aComp={..._ar,curso:[_an,_dv].filter(Boolean).join(" ")||_ar.curso};saveAlu(aComp);}}
          onDelete={delAlu} onToggleActivo={toggleActivoAlu} onVerFicha={onVerFicha}/>}
        {seccion==="docentes" && <SecDocentes docentes={docentes} escuelas={escuelas}
          onSave={saveDoc} onDelete={delDoc}/>}
        {seccion==="pros"     && <SecProfesionales pros={pros}
          onSave={savePro} onDelete={delPro}/>}
        {seccion==="escuelas" && <SecEscuelas escuelas={escuelas}
          onSave={saveEsc} onToggleActivo={toggleActivoEsc}/>}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  
















</script>
</body>
</html>
