        style={{flex:1,background:"#fff",border:`1.5px solid ${BD}`,borderRadius:12,padding:"10px 6px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13,color:TX}}>
        ✏️ Editar
      </button>}
      {onToggleActivo&&<button onClick={()=>setConf({
          msg:`¿${inact?"Reactivar":"Archivar"} a ${alumno.nombre}? Sus datos e historial se conservan.`,
          ok:()=>{onToggleActivo(alumno.id);setConf(null);onBack();}
        })}
        style={{flex:1,background:"#fff",border:`1.5px solid ${BD}`,borderRadius:12,padding:"10px 6px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13,color:inact?G:GR}}>
        {inact?"▶ Reactivar":"⏸ Archivar"}
      </button>}
      {onDelete&&<button onClick={()=>setConf({
          msg:`¿Eliminar a ${alumno.nombre}? Esta acción no se puede deshacer.`,
          ok:()=>{onDelete(alumno.id);setConf(null);onBack();}
        })}
        style={{flex:1,background:"#fff",border:"1.5px solid #fca5a5",borderRadius:12,padding:"10px 6px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13,color:"#dc2626"}}>
        🗑 Eliminar
      </button>}
    </div>

    <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto"}}>
      {[{id:"info",l:"📋 Info"},{id:"docentes",l:"👥 Docentes"},{id:"historial",l:"📝 Historial"},{id:"horarios",l:"🗓 Horarios"},{id:"actividades",l:"✨ Actividades"},].map(t=>
        <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"8px 16px",borderRadius:20,border:"2px solid",borderColor:tab===t.id?ec:BD,background:tab===t.id?ec:"#fff",color:tab===t.id?"#fff":"#475569",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.l}</button>
      )}
    </div>

    {tab==="info"&&<div>
      <Card>
        <SecT text="Datos personales"/>
        <div style={{display:"grid",gap:10}}>
          {[["DNI",alumno.dni],["CUIL",alumno.cuil||"—"],["Fecha de nacimiento",fmtF(alumno.fechaNacimiento)],["Dirección",alumno.direccion||"—"],["Teléfono de casa",alumno.telefonoCasa||"—"]].map(([l,v])=>
            <div key={l}><span style={{fontSize:11,color:GL,textTransform:"uppercase",fontWeight:700}}>{l}</span><div style={{fontWeight:600,fontSize:14,marginTop:2}}>{v}</div></div>
          )}
        </div>
        <div style={{marginTop:14,padding:"10px 14px",borderRadius:10,background:alumno.cud?"#f0fdf4":"#fafafa",border:`1.5px solid ${alumno.cud?"#86efac":BD}`}}>
          <div style={{fontWeight:700,fontSize:13,color:alumno.cud?"#166534":GR}}>{alumno.cud?"✅ Tiene CUD":"⬜ Sin CUD"}</div>
          {alumno.cud&&<><div style={{fontSize:12,color:"#166534",marginTop:2}}>{alumno.cudNumero}</div><div style={{fontSize:11,color:GL,marginTop:1}}>Vence: {fmtF(alumno.cudVencimiento)}</div></>}
        </div>
      </Card>
      <Card>
        <SecT text="Familia y contactos"/>
        {(alumno.tutores||[]).map((t,i,arr)=><div key={i} style={{paddingBottom:14,marginBottom:i<arr.length-1?14:0,borderBottom:i<arr.length-1?`1px solid ${BD}`:"none"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{fontWeight:800,fontSize:15}}>{t.nombre}</div>{t.principal&&<span style={{background:ec+"22",color:ec,borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:800}}>Principal</span>}</div><div style={{fontSize:12,color:GR,marginTop:2}}>{t.relacion} · {t.telefono}</div></div>
            <WA tel={t.telefono}/>
          </div>
        </div>)}
      </Card>
      <Card>
        <SecT text="Salud"/>
        <div style={{display:"grid",gap:10,marginBottom:14}}>
          {[["Diagnóstico",alumno.diagnostico],["Obra Social",alumno.obraSocial?`${alumno.obraSocial} · ${alumno.nroAfiliado}`:"—"],["Medicación",alumno.medicacion||"—"]].map(([l,v])=>
            <div key={l}><span style={{fontSize:11,color:GL,textTransform:"uppercase",fontWeight:700}}>{l}</span><div style={{fontWeight:600,fontSize:14,marginTop:2}}>{v}</div></div>
          )}
        </div>
        <SecT text="Terapias actuales"/>
        {(alumno.terapias||[]).map((t,i,arr)=><div key={i} style={{padding:"10px 0",borderBottom:i<arr.length-1?`1px solid ${BD}`:"none"}}><div style={{fontWeight:700,fontSize:14}}>🔬 {t.nombre}</div><div style={{fontSize:12,color:GR,marginTop:2}}>{t.profesional}</div><div style={{fontSize:11,color:GL,marginTop:1}}>{t.frecuencia}</div></div>)}
      </Card>
      <Card>
        <SecT text="Profesionales externos"/>
        {(alumno.profesionalIds||[]).length===0
          ? <div style={{fontSize:13,color:GL,fontStyle:"italic"}}>Sin profesionales externos asociados.</div>
          : (alumno.profesionalIds||[]).map((pid,i,arr)=>{ const p=pros.find(x=>x.id===pid&&!x.eliminado); if(!p)return null; return <div key={p.id} style={{padding:"10px 0",borderBottom:i<arr.length-1?`1px solid ${BD}`:"none"}}><div style={{fontWeight:700,fontSize:14}}>{p.nombre}</div><div style={{fontSize:12,color:GR}}>{p.rol}</div>{p.mail&&<div style={{fontSize:11,color:GL,marginTop:1}}>✉ {p.mail}</div>}<div style={{display:"flex",gap:6,marginTop:6}}><WA tel={p.telefono}/><Mail mail={p.mail}/></div></div>; })}
      </Card>
      <Card>
        <SecT text="Trayectoria escolar"/>
        {[...(alumno.trayectoria||[])].reverse().map((t,i,arr)=><div key={t.ciclo||i} style={{display:"flex",gap:14,marginBottom:i<arr.length-1?4:0}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:20}}>
            <div style={{width:10,height:10,borderRadius:"50%",marginTop:4,flexShrink:0,background:i===0?ec:"#cbd5e0",border:i===0?`3px solid ${ec}44`:"none"}}/>
            {i<arr.length-1&&<div style={{width:2,flex:1,background:BD,minHeight:20,marginTop:4}}/>}
          </div>
          <div style={{flex:1,paddingBottom:16}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}><span style={{fontWeight:800,fontSize:13,color:i===0?ec:GR}}>{t.ciclo}</span><span style={{background:i===0?ec+"18":"#f1f5f9",color:i===0?ec:"#475569",borderRadius:6,padding:"1px 8px",fontSize:11,fontWeight:700}}>{t.nivel}</span></div>
            <div style={{fontSize:13,fontWeight:600,color:TX}}>{t.institucion}</div>
            {t.notas&&<div style={{fontSize:12,color:GR,marginTop:4,lineHeight:1.5}}>{t.notas}</div>}
          </div>
        </div>)}
      </Card>
    </div>}

    {tab==="docentes"&&<div>
      <div style={{fontSize:13,color:GR,marginBottom:16}}>Tocá un docente para ver su historial con {alumno.nombre.split(" ")[0]}.</div>
      {docsA.length===0
        ? <Card sx={{textAlign:"center",padding:32}}><div style={{fontSize:32,marginBottom:8}}>👩🏫</div><div style={{color:GR}}>Sin docentes asociados. Cargá los horarios del alumno en el panel de configuración.</div></Card>
        : docsA.map(d=>{ const cr=regsA.filter(r=>r.docente===d.nombre).length; const ds=[...new Set((alumno.horarios||[]).filter(h=>h.docenteId===d.id).map(h=>DIAS[h.dia]))].join(", "); return <Card key={d.id} onClick={()=>setDocSel(d)} sx={{borderLeft:`4px solid ${ec}`}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:48,height:48,borderRadius:"50%",flexShrink:0,background:ec+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:ec}}>{(d.nombre||"?").split(" ").pop()[0]}</div>
            <div style={{flex:1}}><div style={{fontWeight:800,fontSize:17,color:TX}}>{d.materia}</div><div style={{fontSize:13,color:"#475569",marginTop:2}}>{d.nombre}</div><div style={{fontSize:12,color:GL,marginTop:3}}>{ds&&`📅 ${ds}`}{cr>0&&` · 📝 ${cr} reg.`}</div></div>
            <div style={{fontSize:20,color:"#cbd5e0"}}>›</div>
          </div>
        </Card>; })}
    </div>}

    {tab==="historial"&&<div>
      {!showForm
        ? <Btn full onClick={()=>setShowForm(true)} color={ec}>+ Nuevo registro</Btn>
        : <FormReg alumno={alumno} docentes={docentes} escColor={ec} onSave={r=>{onAddReg(alumno.id,r);setShowForm(false);}} onCancel={()=>setShowForm(false)}/>}
      <div style={{marginTop:16}}>
        {regsA.length===0
          ? <Card sx={{textAlign:"center",padding:32}}><div style={{fontSize:32,marginBottom:8}}>📝</div><div style={{color:GR}}>Sin registros aún</div></Card>
          : regsA.map(r=><RegCard key={r.id} r={r} onDel={id=>onDelReg(alumno.id,id)}/>)}
      </div>
    </div>}

    {tab==="horarios"&&<div>
      {/* Formulario inline add/edit */}
      {formH && (()=>{
        const docsEsc = docentes.filter(d=>d.escuelaId===alumno.escuelaId&&!d.eliminado);
        const setFH = (k,v) => setFormH(p=>({...p,[k]:v}));
        const esNuevo = formHIdx===null;
        // dias es array para nuevo (multi-select), dia es number para edición
        const toggleDia = d => {
          if(!esNuevo) { setFH("dia",d); return; }
          const dias = formH.dias||[];
          setFH("dias", dias.includes(d) ? dias.filter(x=>x!==d) : [...dias,d]);
        };
        const diaActivo = d => esNuevo ? (formH.dias||[]).includes(d) : formH.dia===d;
        const seSolapaCon = (dia, ini, fin, excluirIdx=null) => {
          const iMin = hMin(ini), fMin = hMin(fin);
          return (alumno.horarios||[]).some((h,i)=>{
            if(i===excluirIdx) return false;
            if(h.dia!==dia) return false;
            const hi=hMin(h.horaInicio), hf=hMin(h.horaFin);
            return iMin<hf && fMin>hi;
          });
        };
        const guardarBloque = () => {
          const nuevos = [...(alumno.horarios||[])];
          if(!esNuevo) {
            if(seSolapaCon(formH.dia,formH.horaInicio,formH.horaFin,formHIdx)){
              alert(`⚠ El horario ${formH.horaInicio}–${formH.horaFin} se solapa con otro bloque del ${DIAS_L[formH.dia]}.`);
              return;
            }
            nuevos[formHIdx] = {...formH, dia:formH.dia};
          } else {
            const dias = (formH.dias||[]).length>0 ? formH.dias : [formH.dia||1];
            const conflictos = dias.filter(d=>seSolapaCon(d,formH.horaInicio,formH.horaFin));
            if(conflictos.length>0){
              alert(`⚠ El horario ${formH.horaInicio}–${formH.horaFin} se solapa con un bloque existente en: ${conflictos.map(d=>DIAS_L[d]).join(", ")}.`);
              return;
            }
            dias.forEach(d => nuevos.push({...formH, dia:d}));
          }
          onSave&&onSave({...alumno, horarios:nuevos});
          setFormH(null); setFormHIdx(null);
        };
        const puedeGuardar = esNuevo ? (formH.dias||[]).length>0 : !!formH.dia;
        return (
          <div style={{background:"#f8fafc",border:`2px solid ${ec}`,borderRadius:16,padding:16,marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:15,color:TX,marginBottom:12}}>
              {esNuevo?"Nuevo bloque":"Editar bloque"}
            </div>
            {/* Día(s) */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:4}}>
                {esNuevo?"Días (podés elegir varios)":"Día"}
              </div>
              {esNuevo&&<div style={{fontSize:11,color:GL,marginBottom:8}}>Tocá los días en que se repite el mismo bloque.</div>}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[1,2,3,4,5].map(d=>(
                  <button key={d} onClick={()=>toggleDia(d)}
                    style={{padding:"7px 12px",borderRadius:20,border:"2px solid",fontFamily:"inherit",fontWeight:700,fontSize:13,cursor:"pointer",
                      borderColor:diaActivo(d)?ec:BD,background:diaActivo(d)?ec:"#fff",color:diaActivo(d)?"#fff":"#475569"}}>
                    {DIAS_L[d].slice(0,3)}
                  </button>
                ))}
              </div>
            </div>
            {/* Horas */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:6}}>Hora inicio</div>
                <input type="time" value={formH.horaInicio} onChange={e=>setFH("horaInicio",e.target.value)}
                  style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:10,padding:"9px 12px",fontSize:14,fontFamily:"inherit",boxSizing:"border-box"}}/>
              </div>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:6}}>Hora fin</div>
                <input type="time" value={formH.horaFin} onChange={e=>setFH("horaFin",e.target.value)}
                  style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:10,padding:"9px 12px",fontSize:14,fontFamily:"inherit",boxSizing:"border-box"}}/>
              </div>
            </div>
            {/* Recreo toggle */}
            <div style={{marginBottom:12}}>
              <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 12px",background:formH.esRecreo?"#f0fdf4":"#fff",borderRadius:10,border:`1.5px solid ${formH.esRecreo?G:BD}`}}>
                <input type="checkbox" checked={formH.esRecreo||false}
                  onChange={e=>{setFH("esRecreo",e.target.checked);if(e.target.checked)setFH("docenteId","");}}
                  style={{width:18,height:18,accentColor:G}}/>
                <span style={{fontSize:14,fontWeight:600,color:formH.esRecreo?G:TX}}>Es recreo / recreación (sin docente)</span>
              </label>
            </div>
            {/* Docente */}
            {!formH.esRecreo && (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:6}}>Docente</div>
                <select value={formH.docenteId||""} onChange={e=>setFH("docenteId",e.target.value)}
                  style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",background:"#fff",boxSizing:"border-box"}}>
                  <option value="">Sin docente asignado</option>
                  {docsEsc.map(d=><option key={d.id} value={d.id}>{d.materia} — {d.nombre}</option>)}
                </select>
                {docsEsc.length===0&&<div style={{fontSize:12,color:"#92400e",marginTop:6,background:"#fffbeb",padding:"6px 10px",borderRadius:8}}>⚠ No hay docentes cargados para esta escuela.</div>}
              </div>
            )}
            {/* Aula */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:6}}>Aula / Espacio</div>
              <input value={formH.aula||""} onChange={e=>setFH("aula",e.target.value)}
                placeholder="Aula 3A, Laboratorio, Patio..."
                style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:10,padding:"9px 12px",fontSize:14,fontFamily:"inherit",boxSizing:"border-box"}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn full outline onClick={()=>{setFormH(null);setFormHIdx(null);}} color={GR}>Cancelar</Btn>
              <Btn full color={ec} onClick={guardarBloque} disabled={!puedeGuardar}>{esNuevo?"Agregar bloque":"Guardar cambios"}</Btn>
            </div>
          </div>
        );
      })()}

      {/* Botón nuevo bloque (solo si no hay form abierto) */}
      {!formH&&<button onClick={()=>{setFormH({dias:[],horaInicio:"08:00",horaFin:"09:00",docenteId:"",aula:"",esRecreo:false});setFormHIdx(null);}}
        style={{width:"100%",padding:"12px",borderRadius:14,border:`2px dashed ${ec}`,background:ec+"0a",color:ec,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",marginBottom:12}}>
        + Agregar bloque horario
      </button>}

      {/* Lista agrupada por día */}
      {[1,2,3,4,5].map(dia=>{
        const bloques = (alumno.horarios||[])
          .map((h,i)=>({...h,_i:i}))
          .filter(h=>h.dia===dia)
          .sort((a,b)=>a.horaInicio>b.horaInicio?1:-1);
        if(bloques.length===0) return null;
        return (
          <div key={dia} style={{marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:800,color:ec,textTransform:"uppercase",letterSpacing:.5,marginBottom:6,paddingLeft:4}}>
              {DIAS_L[dia]}
            </div>
            {bloques.map(h=>{
              const doc = h.docenteId ? docentes.find(d=>d.id===h.docenteId) : null;
              return (
                <div key={h._i} style={{background:"#fff",border:`1.5px solid ${BD}`,borderRadius:14,padding:"12px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:12}}>
                  {/* Hora */}
                  <div style={{background:h.esRecreo?"#f0fdf4":ec+"15",borderRadius:10,padding:"8px 10px",textAlign:"center",flexShrink:0,minWidth:52}}>
                    <div style={{fontSize:13,fontWeight:800,color:h.esRecreo?G:ec,lineHeight:1}}>{h.horaInicio}</div>
                    <div style={{fontSize:10,color:GL,marginTop:2}}>{h.horaFin}</div>
                  </div>
                  {/* Info */}
                  <div style={{flex:1,minWidth:0}}>
                    {h.esRecreo
                      ? <div style={{fontWeight:700,fontSize:14,color:G}}>☕ Recreo</div>
                      : <>
                          <div style={{fontWeight:800,fontSize:14,color:TX}}>{doc?.materia||"Sin materia"}</div>
                          <div style={{fontSize:12,color:GR,marginTop:2}}>{doc?.nombre||"Sin docente"}{h.aula?` · ${h.aula}`:""}</div>
                        </>
                    }
                  </div>
                  {/* Acciones */}
                  {!formH&&<div style={{display:"flex",gap:4}}>
                    <button onClick={()=>{setFormH({...h});setFormHIdx(h._i);}}
                      style={{background:ec+"15",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",color:ec,fontWeight:700,fontSize:12,fontFamily:"inherit"}}>
                      Editar
                    </button>
                    <button onClick={()=>{
                        const nuevos=(alumno.horarios||[]).filter((_,i)=>i!==h._i);
                        onSave&&onSave({...alumno,horarios:nuevos});
                      }}
                      style={{background:"#fef2f2",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",color:"#dc2626",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>
                      Quitar
                    </button>
                  </div>}
                </div>
              );
            })}
          </div>
        );
      })}

      {(alumno.horarios||[]).length===0&&!formH&&(
        <div style={{textAlign:"center",padding:"32px 16px",color:GL}}>
          <div style={{fontSize:36,marginBottom:8}}>🗓</div>
          <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>Sin horarios cargados</div>
          <div style={{fontSize:13}}>Tocá "+ Agregar bloque horario" para empezar.</div>
        </div>
      )}
    </div>}
    {tab==="actividades"&&<TabActividades alumno={alumno} registros={registros} docentes={docentes} ec={ec}/>}
  </div>;
}
// ═══════════════════════════════════════════════════════════════
// TAB ACTIVIDADES — generación adaptativa con Claude
// ═══════════════════════════════════════════════════════════════
// Este componente es el corazón de la funcionalidad de IA.
// Toma todo lo que sabe sobre el alumno — su diagnóstico,
// sus terapias, su historial de registros de clase, los acuerdos
// con los docentes — y le pide a Claude que genere actividades
// pedagógicas adaptadas a su nivel y momento actual.
// ─── Stub de documentos — apunta a aye-docs ──────────────────
function TabDocumentosStub({alumno,ec}){
  return <div>
    <Card sx={{background:"linear-gradient(135deg,#1a202c,#2d3748)",border:"none"}}>
      <div style={{color:"#fff"}}>
        <div style={{fontSize:22,marginBottom:8}}>📄</div>
        <div style={{fontWeight:800,fontSize:16,marginBottom:6}}>Documentos oficiales</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.8)",lineHeight:1.6}}>La PPI, el Informe de Medio Año y el Informe Final de {alumno.nombre.split(" ")[0]} se gestionan en el módulo <strong>aye-docs</strong>.</div>
      </div>
    </Card>
    {[{icon:"📋",l:"PPI — Propuesta Pedagógica de Inclusión",d:"Marzo–Mayo · Firman todos los actores"},{icon:"📊",l:"Informe de Medio Año",d:"Julio–Agosto · Balance del primer semestre"},{icon:"🏁",l:"Informe Final Anual",d:"Noviembre · Con tabla de calificaciones"}].map((i,idx)=>(
      <Card key={idx} sx={{borderLeft:`3px solid ${ec}`,padding:"12px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:24}}>{i.icon}</span>
          <div><div style={{fontWeight:800,fontSize:14}}>{i.l}</div><div style={{fontSize:12,color:GR,marginTop:2}}>{i.d}</div></div>
        </div>
      </Card>
    ))}
    <div style={{background:"#f0fdf4",borderRadius:12,padding:"12px 14px",fontSize:12,color:"#166534",lineHeight:1.5}}>
      💡 Abrí el artifact <strong>aye-docs</strong> para completar y exportar estos documentos. Los datos se sincronizan automáticamente por localStorage.
    </div>
  </div>;
}

function TabActividades({ alumno, registros, docentes, ec }) {
  const [materiaSeleccionada, setMateriaSeleccionada] = useState("");
  const [actividades, setActividades]                 = useState(null);
  const [cargando, setCargando]                       = useState(false);
  const [error, setError]                             = useState("");
  const [orientacion, setOrientacion]                 = useState(""); // tema o contexto que Aye quiere orientar

  // Extraemos las materias únicas de los horarios del alumno
  // para que Aye pueda elegir para qué materia quiere actividades
  const materias = [...new Set(
    (alumno.horarios||[])
      .filter(h => h.docenteId && !h.esRecreo)
      .map(h => docentes.find(d => d.id === h.docenteId)?.materia)
      .filter(Boolean)
  )];

  // Tomamos los registros relevantes: los más recientes de la materia
  // seleccionada, que son los que mejor reflejan el momento actual del alumno
  const regsMateria = (registros[alumno.id] || [])
    .filter(r => !r.eliminado && (!materiaSeleccionada || r.materia === materiaSeleccionada))
    .sort((a, b) => b.fecha.localeCompare(a.fecha))
    .slice(0, 8); // usamos los últimos 8 para no exceder el contexto

  const generarActividades = async () => {
    if (!materiaSeleccionada) return;
    setCargando(true);
    setError("");
    setActividades(null);

    // Construimos un resumen del historial reciente para pasarle a Claude.
    // Cuanto más contexto específico le damos, más personalizadas son las actividades.
    const historialResumen = regsMateria.length > 0
      ? regsMateria.map(r =>
          `• ${fmtF(r.fecha)}: ${r.asistencia}. ${r.avance ? `Avance: ${r.avance}` : "Sin avance registrado."}${r.acuerdo ? ` Acuerdo: ${r.acuerdo}` : ""}`
        ).join("\n")
      : "Sin registros previos en esta materia.";

    // El docente actual de esa materia
    const docenteMateria = docentes.find(d =>
      (alumno.horarios||[]).some(h => h.docenteId === d.id) &&
      d.materia === materiaSeleccionada
    );

    try {
      const res = await fetch("/api/claude", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({
          model: "claude-sonnet-4-5",
          max_tokens: 1200,
          messages: [{
            role: "user",
            content: `Sos una especialista en educación inclusiva y diseño de actividades adaptadas para alumnos con necesidades educativas especiales en Argentina.

ALUMNO/A: ${alumno.nombre}
CURSO: ${alumno.curso}
DIAGNÓSTICO: ${alumno.diagnostico}
TERAPIAS ACTUALES: ${(alumno.terapias || []).map(t => `${t.nombre} (${t.frecuencia})`).join(", ") || "Ninguna"}
MATERIA: ${materiaSeleccionada}
${docenteMateria ? `DOCENTE: ${docenteMateria.nombre}` : ""}
${orientacion.trim() ? `\nORIENTACIÓN DE LA DOCENTE INTEGRADORA: ${orientacion.trim()}\n(Este es el tema o contexto específico que se está trabajando en el aula. Las actividades deben girar en torno a esto.)` : ""}

HISTORIAL RECIENTE DE CLASES (del más reciente al más antiguo):
${historialResumen}

Generá 3 actividades adaptadas para la próxima clase (consolidación, avance, extensión). Sé conciso.

Respondé ÚNICAMENTE con JSON válido, sin backticks:

{
  "contexto": "resumen breve del nivel actual en esta materia",
  "actividades": [
    {
      "nivel": "Consolidación",
      "emoji": "🔁",
      "titulo": "nombre corto",
      "descripcion": "cómo realizarla y materiales (máx 2 oraciones)",
      "objetivo": "qué trabaja",
      "tiempo": "X min",
      "adaptaciones": "ajuste para el diagnóstico (máx 1 oración)"
    },
    {
      "nivel": "Avance",
      "emoji": "📈",
      "titulo": "nombre corto",
      "descripcion": "cómo realizarla (máx 2 oraciones)",
      "objetivo": "qué trabaja",
      "tiempo": "X min",
      "adaptaciones": "ajuste (máx 1 oración)"
    },
    {
      "nivel": "Extensión",
      "emoji": "⭐",
      "titulo": "nombre corto",
      "descripcion": "cómo realizarla (máx 2 oraciones)",
      "objetivo": "qué trabaja",
      "tiempo": "X min",
      "adaptaciones": "ajuste (máx 1 oración)"
    }
  ]
}`
          }]
        })
      });

      const data = await res.json();

      // Si la API devolvió un error, mostrarlo claramente
      if (!res.ok || data.error) {
        const msg = data.error || "Error desconocido";
        if (msg.toLowerCase().includes("credit") || msg.toLowerCase().includes("balance")) {
          setError("⚠️ Sin créditos en la API de IA. Cargá saldo en console.anthropic.com para usar esta función.");
        } else {
          setError(`Error de IA: ${msg}`);
        }
        return;
      }

      const texto = data.content?.[0]?.text || "";
      if (!texto) { setError("La IA no devolvió respuesta. Intentá de nuevo."); return; }
      const limpio = texto.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(limpio);
      setActividades(parsed);

    } catch (err) {
      setError("No se pudieron generar las actividades. Verificá la conexión e intentá de nuevo.");
      console.error(err);
    } finally {
      setCargando(false);
    }
  };

  // Colores según el nivel de la actividad
  const coloresNivel = {
    "Consolidación": { bg:"#eff6ff", border:"#3b82f6", badge:"#2563eb", texto:"#1e40af" },
    "Avance":        { bg:"#f0fdf4", border:"#22c55e", badge:"#16a34a", texto:"#166534" },
    "Extensión":     { bg:"#fefce8", border:"#eab308", badge:"#ca8a04", texto:"#854d0e" },
  };

  return (
    <div>
      {/* Explicación de la funcionalidad */}
      <Card sx={{background:"linear-gradient(135deg,#1a202c,#2d3748)",border:"none"}}>
        <div style={{color:"#fff"}}>
          <div style={{fontSize:22,marginBottom:8}}>✨</div>
          <div style={{fontWeight:800,fontSize:16,marginBottom:6}}>Actividades generadas por IA</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.8)",lineHeight:1.6}}>
            Claude analiza el historial de {alumno.nombre.split(" ")[0]} en la materia que elijas y genera actividades adaptadas a su nivel actual, su diagnóstico y los acuerdos que fuiste haciendo con los docentes.
          </div>
        </div>
      </Card>

      {/* Selector de materia */}
      <div style={{marginBottom:16}}>
        <SecT text="¿Para qué materia?" />
        {materias.length === 0 ? (
          <div style={{fontSize:13,color:GL,fontStyle:"italic",padding:"12px 0"}}>
            Este alumno no tiene horarios cargados todavía. Cargalos desde el Panel de Configuración para poder generar actividades.
          </div>
        ) : (
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {materias.map(m => (
              <button key={m} onClick={()=>{setMateriaSeleccionada(m);setActividades(null);}} style={{
                padding:"10px 16px", borderRadius:12, border:"2px solid",
                borderColor:materiaSeleccionada===m?ec:BD,
                background:materiaSeleccionada===m?ec:"#fff",
                color:materiaSeleccionada===m?"#fff":"#475569",
                fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit",

          </div>

      </div>

      {/* Resumen del contexto disponible */}
      {materiaSeleccionada && (
        <div style={{background:"#f8fafc",borderRadius:12,padding:"12px 14px",marginBottom:16,border:`1px solid ${BD}`}}>
          <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:8}}>
            Contexto que Claude va a analizar
          </div>
          <div style={{fontSize:13,color:"#475569",lineHeight:1.6}}>
            📋 Diagnóstico: <strong>{alumno.diagnostico}</strong><br/>
            🔬 Terapias: <strong>{(alumno.terapias||[]).map(t=>t.nombre).join(", ")||"Ninguna"}</strong><br/>
            📝 Registros disponibles en {materiaSeleccionada}: <strong>{regsMateria.length} clase{regsMateria.length!==1?"s":""}</strong>
          </div>
          {regsMateria.length === 0 && (
            <div style={{marginTop:8,fontSize:12,color:"#f59e0b",fontWeight:600}}>
              ⚠ Sin registros en esta materia todavía. Las actividades van a basarse solo en el diagnóstico y las terapias.
            </div>
          )}

      )}

      {/* Campo de orientación temática — opcional pero muy útil */}
      {materiaSeleccionada && !actividades && !cargando && (
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:6,letterSpacing:.5}}>

          </div>
          <textarea
            value={orientacion}
            onChange={e=>setOrientacion(e.target.value)}
            placeholder={`Ej: "Estamos viendo fracciones con denominadores distintos" · "La semana que viene hay prueba de la Revolución de Mayo" · "Repaso de sustantivos y adjetivos"

Si lo dejás vacío Claude decide según el historial.`}
            style={{width:"100%",border:`2px solid ${orientacion.trim()?ec:BD}`,borderRadius:12,padding:"10px 14px",fontSize:13,fontFamily:"inherit",color:TX,background:orientacion.trim()?"#f0fdf4":"#f8fafc",boxSizing:"border-box",outline:"none",resize:"vertical",minHeight:80,lineHeight:1.5,transition:"border .2s, background .2s"}}

            Está revisando el historial de {alumno.nombre.split(" ")[0]} en {materiaSeleccionada} y diseñando actividades adaptadas a su nivel actual.

                  </div>

    </div>
  );

}

function Reportes({alumnos, docentes, pros, escuelas, registros, recs, onVerAlumno}) {
  const [aluId,      setAluId]     = useState("");
  const [docActivo,  setDocActivo] = useState("materia");
  const [filMateria, setFilMateria]= useState("");
  const [filDesde,   setFilDesde]  = useState("");
  const [filHasta,   setFilHasta]  = useState("");
  const [generando,  setGenerando] = useState(null);
  const [pdfPag,     setPdfPag]    = useState(0);

  const cicloAct = String(new Date().getFullYear());
  const alumno   = aluId ? alumnos.find(a=>String(a.id)===String(aluId)&&!a.eliminado) : null;
  const escuela  = alumno ? escuelas.find(e=>e.id===alumno.escuelaId) : null;
  const ec       = escuela?.color||G;

  const regsAlu  = alumno
    ? (registros[aluId]||[]).filter(r=>!r.eliminado).sort((a,b)=>b.fecha>a.fecha?1:-1)
    : [];
  const materias = [...new Set(regsAlu.map(r=>r.materia).filter(Boolean))].sort();
  const regsFiltrados = regsAlu.filter(r=>{
    if(filMateria && r.materia!==filMateria) return false;
    if(filDesde && r.fecha < filDesde) return false;
    if(filHasta && r.fecha > filHasta) return false;
    return true;
  });

  // Docs — carga desde localStorage y Supabase
  const storageKey = aluId ? `aye_docs_${aluId}_${cicloAct}` : null;
  const [docs, setDocs] = useState({ppi:{},medio:{},final:{}});
  useEffect(()=>{
    if(!aluId) return;
    // 1. Carga inmediata desde localStorage
    const local = leer(`aye_docs_${aluId}_${cicloAct}`, {ppi:{},medio:{},final:{}});
    setDocs(local);
    // 2. Merge con Supabase en segundo plano
    fetch("/api/db/documentos", { headers: authHeaders() }).then(r=>r.json()).then(rows=>{
      const deEsteAlu = (rows||[]).filter(d=>d.alumnoId===aluId&&d.ciclo===cicloAct&&!d.eliminado);
      if(deEsteAlu.length===0) return;
      const merged = {...local};
      deEsteAlu.forEach(d=>{ merged[d.tipo] = {...(merged[d.tipo]||{}), ...d.contenido}; });
      setDocs(merged);
      grabar(`aye_docs_${aluId}_${cicloAct}`, merged);
    }).catch(()=>{});
  },[aluId]);
  const setDoc = (tipo,campo,valor) => {
    const nuevo={...docs,[tipo]:{...docs[tipo],[campo]:valor}};
    setDocs(nuevo);
    if(storageKey) grabar(storageKey,nuevo);
    // Guardar en Supabase
    if(aluId) DB.save("documentos",{
      id:`${aluId}_${cicloAct}_${tipo}`,
      alumnoId:aluId, ciclo:cicloAct, tipo,
      contenido:nuevo[tipo], eliminado:false
    });
  };

  const generarConClaude = async(tipo) => {
    if(!alumno) return;
    setGenerando(tipo);
    const hist = regsAlu.slice(0,8).map(r=>`${fmtF(r.fecha)} - ${r.materia}: ${r.avance||""}`).join("\n")||"Sin registros.";
    const paradigma = "Usá modelo social PBA 2026: intervencion, ajuste razonable, facilitador, trayectoria. NO uses: dificultad, limitación, déficit.";
    const instrBase = `Alumno/a: ${alumno.nombre} | Diagnóstico: ${alumno.diagnostico} | Curso: ${alumno.curso}\nRegistros recientes:\n${hist}\n\n${paradigma}\n\nIMPORTANTE: Respondé SOLO con el texto del informe, sin títulos, sin encabezados, sin markdown, sin asteriscos, sin nombres del alumno al inicio. Solo el cuerpo narrativo listo para pegar.`;
    const p = {
      ppi:`${instrBase}\n\nEscribí un párrafo sobre la situación de aprendizaje actual del alumno/a basándote en los registros.`,
      medio:`${instrBase}\n\nEscribí un informe narrativo de medio año organizado por materia. Para cada materia mencionada en los registros, un párrafo. Sin encabezados ni títulos de sección.`,
      final:`${instrBase}\n\nEscribí un informe final anual narrativo con síntesis del recorrido del alumno/a. Sin encabezados ni títulos de sección.`,
    };
    try {
      const res=await fetch("/api/claude",{method:"POST",headers:authHeaders(),
        body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:800,messages:[{role:"user",content:p[tipo]}]})});
      const data=await res.json();
      if(!res.ok||data.error){
        const msg=data.error||"Error";
        setDoc(tipo,"contenido", msg.toLowerCase().includes("credit")||msg.toLowerCase().includes("balance")
          ? "[Sin créditos en la API. Cargá saldo en console.anthropic.com]"
          : `[Error de IA: ${msg}]`);
        return;
      }
      const txt=data.content?.[0]?.text||"";
      if(tipo==="ppi") setDoc("ppi","situacionActual",txt);
      else setDoc(tipo,"contenido",txt);
    } catch { setDoc(tipo,"contenido","[Sin conexión. Completá manualmente.]"); }
    finally { setGenerando(null); }
  };

  // Imprimir ficha del alumno (solo datos, sin registros)
  const imprimirFicha = () => {
    if(!alumno) return;
    const color = escuela?.color||G;
    const docsAlu = [...new Set((alumno.horarios||[]).filter(h=>h.docenteId).map(h=>h.docenteId))]
      .map(id=>docentes.find(d=>d.id===id)).filter(Boolean);
    const prosAlu = (alumno.profesionalIds||[]).map(id=>pros.find(p=>p.id===id)).filter(Boolean);
    // Horarios agrupados por docente/materia con días
    const horariosPorDoc = docsAlu.map(d=>{
      const dias = [...new Set((alumno.horarios||[]).filter(h=>h.docenteId===d.id).map(h=>DIAS_L[h.dia].slice(0,3)))].join(", ");
      const h0 = (alumno.horarios||[]).find(h=>h.docenteId===d.id);
      return {d, dias, hora:`${h0?.horaInicio||""}–${h0?.horaFin||""}`, aula:h0?.aula||""};
    });
    const hoy = new Date().toLocaleDateString("es-AR");
    const css = CSS_BASE + `
      .alu-cab{border-top:3px solid ${color};margin:14px 0 10px;padding-top:10px}
      .alu-nombre{font-size:17pt;font-weight:700;color:#1a202c;margin:0 0 2px}
      .alu-sub{font-size:10pt;color:#64748b}
      h2{font-size:10pt;color:${color};text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin:14px 0 7px;padding-bottom:3px;border-bottom:1px solid #e2e8f0}
      .dato{display:flex;gap:12px;margin-bottom:5px;font-size:10.5pt}
      .lbl{color:#64748b;font-size:9pt;text-transform:uppercase;font-weight:700;min-width:130px;padding-top:1px}`;
    const html = `<div class="pag">
      ${ENC_HTML()}
      <div class="alu-cab">
        <div class="alu-nombre">${alumno.nombre}</div>
        <div class="alu-sub">${alumno.curso||""}${alumno.curso&&escuela?" · ":""}${escuela?.nombre||""} · Ficha del estudiante</div>
      </div>
      <h2>Datos personales</h2>
      ${alumno.diagnostico?`<div class="dato"><span class="lbl">Diagnóstico</span><span>${alumno.diagnostico}</span></div>`:""}
      ${alumno.dni?`<div class="dato"><span class="lbl">DNI</span><span>${alumno.dni}</span></div>`:""}

      ${alumno.cud?`<div class="dato"><span class="lbl">CUD</span><span>${alumno.cudNumero||"Sí"}${alumno.cudVencimiento?" (vence "+fmtF(alumno.cudVencimiento)+")":""}</span></div>`:""}
      ${alumno.medicacion?`<div class="dato"><span class="lbl">Medicación</span><span>${alumno.medicacion}</span></div>`:""}
      ${(alumno.tutores||[]).filter(t=>t.nombre).length>0?`<h2>Familia y contactos</h2>${(alumno.tutores||[]).filter(t=>t.nombre).map(t=>`<div class="dato"><span class="lbl">${t.relacion||"Tutor/a"}</span><span>${t.nombre}${t.telefono?" · "+t.telefono:""}</span></div>`).join("")}`:""}
      ${docsAlu.length>0?`<h2>Docentes</h2>${horariosPorDoc.map(({d,dias,hora,aula})=>`<div class="dato"><span class="lbl">${d.materia}</span><span>${d.nombre} · ${dias} ${hora}${aula?" · "+aula:""}</span></div>`).join("")}`:""}
      ${prosAlu.length>0?`<h2>Profesionales externos</h2>${prosAlu.map(p=>`<div class="dato"><span class="lbl">${p.rol}</span><span>${p.nombre}${p.telefono?" · "+p.telefono:""}</span></div>`).join("")}`:""}
      ${(alumno.terapias||[]).filter(t=>t.nombre).length>0?`<h2>Terapias</h2>${(alumno.terapias||[]).filter(t=>t.nombre).map(t=>`<div class="dato"><span class="lbl">${t.nombre}</span><span>${t.frecuencia||""}${t.profesional?" · "+t.profesional:""}</span></div>`).join("")}`:""}
      ${FIRMA_HTML(hoy)}
    </div>`;
    abrirPDF(`Ficha — ${alumno.nombre}`, css, html);
  };

  // Exportar historial / por materia a PDF (de a 30 registros)
  const exportarPDF = (regs, titulo) => {
    if(!alumno) return;
    const LOTE = 30;
    const desde = pdfPag * LOTE;
    const lote  = regs.slice(desde, desde + LOTE);
    const total = regs.length;
    const pags  = Math.ceil(total / LOTE);
    const color = escuela?.color || G;
    const hoy = new Date().toLocaleDateString("es-AR");
    const filas = lote.map(r=>`
      <tr>

      </tr>`).join("");
    const paginaLabel = pags>1 ? ` — Página ${pdfPag+1} de ${pags} (registros ${desde+1}–${Math.min(desde+LOTE,total)} de ${total})` : ` — ${total} registros`;
    const css = CSS_BASE + `
      .chips{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px}
      .chip{background:${color}18;color:${color};border-radius:20px;padding:3px 10px;font-size:9pt;font-weight:700}
      .titulo{font-size:15pt;font-weight:700;color:#1a202c;margin:0 0 10px}
      table{width:100%;border-collapse:collapse;margin-top:4px}
      th{background:${color};color:#fff;padding:6px 8px;font-size:9pt;text-align:left;font-weight:700}
      td{padding:5px 8px;border-bottom:1px solid #e2e8f0;font-size:9pt;vertical-align:top}
      tr:nth-child(even) td{background:#f8fafc}`;
    const html=`<div class="pag">
      ${ENC_HTML()}
      <div class="titulo">${titulo}${paginaLabel}</div>
      <div class="chips">
        <span class="chip">👤 ${alumno.nombre}</span>
        <span class="chip">🏫 ${escuela?.nombre||"—"}</span>
        ${alumno.curso?`<span class="chip">📚 ${alumno.curso}</span>`:""}
        ${alumno.dni?`<span class="chip">🪪 DNI ${alumno.dni}</span>`:""}
        ${alumno.fechaNacimiento?`<span class="chip">🎂 ${fmtF(alumno.fechaNacimiento)}</span>`:""}
        ${filDesde||filHasta?`<span class="chip">📅 ${filDesde?fmtF(filDesde):"inicio"} → ${filHasta?fmtF(filHasta):"hoy"}</span>`:""}
      </div>
      <table>
        <thead><tr><th>Fecha</th><th>Materia</th><th>Asistencia</th><th>Avance / Observación</th><th>Acuerdo</th></tr></thead>
        <tbody>${filas||`<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:16px">Sin registros</td></tr>`}</tbody>
      </table>
      ${FIRMA_HTML(hoy)}
    </div>`;
    abrirPDF(`${titulo} — ${alumno.nombre}`, css, html);
  };

  // Single mode: por alumno con filtros de materia y fecha

  return (
    <div style={{paddingBottom:8}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a202c,#2d3748)",padding:"16px 20px 12px",color:"#fff"}}>
        <div style={{fontWeight:800,fontSize:18,marginBottom:12}}>📊 Reportes</div>

      </div>

      <div style={{padding:"16px"}}>

      {/* ── REPORTES POR ALUMNO ── */}
      {true&&<>
        <select value={aluId} onChange={e=>{setAluId(e.target.value);setFilMateria("");setDocActivo("materia");setPdfPag(0);}}
          style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:12,padding:"10px 14px",
            fontSize:14,fontFamily:"inherit",background:"#fff",color:aluId?TX:GL,
            boxSizing:"border-box",marginBottom:16}}>
          <option value="">Seleccionar estudiante...</option>
          {alumnos.filter(a=>!a.eliminado&&a.nombre).map(a=>{
            const e=escuelas.find(x=>x.id===a.escuelaId);
            return <option key={a.id} value={String(a.id)}>{a.nombre} — {e?.nombre}</option>;
          })}
        </select>

        {alumno&&<>
          {/* Mini ficha con acciones */}
          <div style={{background:`linear-gradient(135deg,${ec},${ec}bb)`,borderRadius:16,padding:16,color:"#fff",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:"rgba(255,255,255,.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,flexShrink:0}}>
                {alumno.nombre.split(" ").slice(0,2).map(p=>p[0]).join("")}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:16}}>{alumno.nombre}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,.8)",marginTop:2}}>{alumno.curso} · {escuela?.nombre}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginTop:1}}>{alumno.diagnostico}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>onVerAlumno&&onVerAlumno(alumno.id)}
                style={{flex:1,background:"rgba(255,255,255,.2)",border:"none",borderRadius:10,color:"#fff",padding:"8px",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                👤 Ver ficha
              </button>
              <button onClick={imprimirFicha}
                style={{flex:1,background:"rgba(255,255,255,.2)",border:"none",borderRadius:10,color:"#fff",padding:"8px",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                🖨️ Imprimir ficha
              </button>
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
            {[
              {id:"materia",  label:"📚 Registros"},
{id:"ppi",      label:"📋 PPI"},
              {id:"medio",    label:"📊 Medio año"},
              {id:"final",    label:"🏁 Inf. Final"},
            ].map(t=>(
              <button key={t.id} onClick={()=>{setDocActivo(t.id);setPdfPag(0);}} style={{
                padding:"7px 12px",borderRadius:20,border:"2px solid",flexShrink:0,
                borderColor:docActivo===t.id?ec:BD,
                background:docActivo===t.id?ec:"#fff",
                color:docActivo===t.id?"#fff":"#475569",
                fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{t.label}</button>
            ))}
          </div>

          {/* Por materia */}
          {docActivo==="materia"&&(()=>{
            const regs = regsFiltrados;
            const LOTE = 30;
            const pags = Math.ceil(regs.length/LOTE);
            const pg   = Math.min(pdfPag, Math.max(0,pags-1));
            return <>
              {/* Filtros */}
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:4}}>Desde</div>
                  <input type="date" value={filDesde} onChange={e=>{setFilDesde(e.target.value);setPdfPag(0);}}
                    style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"inherit",color:TX,background:"#fff",boxSizing:"border-box"}}/>
                </div>

                  <div style={{fontSize:10,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:4}}>Hasta</div>
                  <input type="date" value={filHasta} onChange={e=>{setFilHasta(e.target.value);setPdfPag(0);}}
                    style={{width:"100%",border:`1.5px solid ${BD}`,borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"inherit",color:TX,background:"#fff",boxSizing:"border-box"}}/>
                </div>
                {(filDesde||filHasta)&&<button onClick={()=>{setFilDesde("");setFilHasta("");setPdfPag(0);}}
                  style={{background:"none",border:`1.5px solid ${BD}`,borderRadius:8,padding:"0 8px",cursor:"pointer",color:GR,fontSize:12,fontFamily:"inherit",alignSelf:"flex-end",marginBottom:1}}>✕</button>}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                <button onClick={()=>{setFilMateria("");setPdfPag(0);}} style={{padding:"5px 14px",borderRadius:20,border:"2px solid",borderColor:!filMateria?ec:BD,background:!filMateria?ec:"#fff",color:!filMateria?"#fff":"#475569",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Todas</button>
                {materias.map(m=>(
                  <button key={m} onClick={()=>{setFilMateria(m);setPdfPag(0);}} style={{padding:"5px 14px",borderRadius:20,border:"2px solid",borderColor:filMateria===m?ec:BD,background:filMateria===m?ec:"#fff",color:filMateria===m?"#fff":"#475569",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{m}</button>
                ))}
              </div>
              {/* Barra de exportación */}
              {regs.length>0&&<div style={{background:"#f8fafc",border:`1px solid ${BD}`,borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <span style={{fontSize:13,color:GR,flex:1}}>{regs.length} {regs.length===1?"registro":"registros"}{filMateria?` · ${filMateria}`:""}</span>
                {pags>1&&<>
                  <span style={{fontSize:12,color:"#92400e",background:"#fffbeb",border:"1px solid #f59e0b",borderRadius:8,padding:"3px 8px",fontWeight:600}}>
                    ⚠ Más de 30 — se exporta de a 30
                  </span>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <button onClick={()=>setPdfPag(p=>Math.max(0,p-1))} disabled={pg===0}
                      style={{background:"none",border:`1px solid ${BD}`,borderRadius:6,width:26,height:26,cursor:pg===0?"not-allowed":"pointer",color:pg===0?GL:GR,fontSize:14}}>‹</button>
                    <span style={{fontSize:12,fontWeight:700,color:TX,minWidth:60,textAlign:"center"}}>Pág {pg+1}/{pags}</span>
                    <button onClick={()=>setPdfPag(p=>Math.min(pags-1,p+1))} disabled={pg===pags-1}
                      style={{background:"none",border:`1px solid ${BD}`,borderRadius:6,width:26,height:26,cursor:pg===pags-1?"not-allowed":"pointer",color:pg===pags-1?GL:GR,fontSize:14}}>›</button>
                  </div>
                </>}
                <button onClick={()=>exportarPDF(regs,filMateria?`Registros · ${filMateria}`:"Registros por materia")}
                  style={{background:ec,border:"none",borderRadius:10,color:"#fff",padding:"7px 14px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                  📥 Exportar PDF
                </button>
              </div>}
              {/* Lista */}
              {regs.length===0
                ? <Card sx={{textAlign:"center",padding:24}}><div style={{color:GR}}>Sin registros{filMateria?` de ${filMateria}`:""}</div></Card>
                : regs.map(r=>(
                    <Card key={r.id} sx={{borderLeft:`3px solid ${ec}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <div style={{fontWeight:700,fontSize:14,color:TX}}>{r.materia||"—"}</div>
                        <div style={{fontSize:11,color:GL}}>{fmtF(r.fecha)}</div>
                      </div>
                      {r.avance&&<div style={{fontSize:13,color:TX,lineHeight:1.5,marginBottom:4}}>{r.avance}</div>}
                      {r.acuerdo&&<div style={{fontSize:12,color:GR,fontStyle:"italic"}}>Acuerdo: {r.acuerdo}</div>}
                    </Card>
                  ))
              }
            </>;
          })()}

          {/* Docs */}
          {docActivo==="ppi"&&<EditorPPI alumno={alumno} docentes={docentes} escuela={escuela} d={docs.ppi} setD={(k,v)=>setDoc("ppi",k,v)} generando={generando} onGenerar={()=>generarConClaude("ppi")}/>}
          {docActivo==="medio"&&<EditorInforme tipo="medio" alumno={alumno} docentes={docentes} escuela={escuela} d={docs.medio} setD={(k,v)=>setDoc("medio",k,v)} generando={generando} onGenerar={()=>generarConClaude("medio")}/>}
          {docActivo==="final"&&<EditorInforme tipo="final" alumno={alumno} docentes={docentes} escuela={escuela} d={docs.final} setD={(k,v)=>setDoc("final",k,v)} generando={generando} onGenerar={()=>generarConClaude("final")}/>}
        </>}

        {!alumno&&<Card sx={{textAlign:"center",padding:40}}>
          <div style={{fontSize:48,marginBottom:12}}>📊</div>
          <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>Seleccioná un estudiante</div>
          <div style={{fontSize:13,color:GR}}>Para ver su historial, filtrar por materia y generar documentos.</div>
        </Card>}
      </>}


      </div>
    </div>
  );
}

function Avisos({alumnos, recs, onAdd, onDel}) {
  const [show,setShow] = useState(false);
  const [txt,setTxt] = useState(""); const [aId,setAId] = useState(""); const [fec,setFec] = useState(""); const [pri,setPri] = useState("media");
  const [conf,setConf] = useState(null);
  const act = recs.filter(r=>!r.eliminado).sort((a,b)=>{const p={alta:0,media:1,baja:2};return p[a.prioridad]!==p[b.prioridad]?p[a.prioridad]-p[b.prioridad]:a.fecha.localeCompare(b.fecha);});
  const pc = {alta:"#dc2626",media:"#f59e0b",baja:G};
  const pb = {alta:"#fef2f2",media:"#fffbeb",baja:"#f0fdf4"};
  const save = () => { if(!txt||!fec)return; onAdd({id:"rc"+uid(),alumnoId:aId,texto:txt,fecha:fec,prioridad:pri,eliminado:false}); setTxt("");setAId("");setFec("");setPri("media");setShow(false); };
  return <div>
    {conf&&<Confirm msg="¿Eliminar este aviso?" onOk={()=>{onDel(conf);setConf(null);}} onNo={()=>setConf(null)}/>}
    <div style={{fontSize:22,fontWeight:800,color:TX,marginBottom:4}}>Avisos</div>
    <div style={{fontSize:14,color:GR,marginBottom:20}}>Recordatorios y seguimientos pendientes</div>
    {!show?<Btn full onClick={()=>setShow(true)}>+ Nuevo aviso</Btn>
      :<Card sx={{border:`2px solid ${G}`,marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:16,marginBottom:16}}>Nuevo aviso</div>
        <Sel label="Alumno (opcional)" value={aId} onChange={setAId} opts={alumnos.filter(a=>!a.eliminado&&a.activo!==false).map(a=>({v:a.id,l:a.nombre}))} ph="Sin alumno específico"/>
        <Fld label="Descripción" value={txt} onChange={setTxt} multiline placeholder="¿Qué tenés que hacer o recordar?"/>
        <Fld label="Fecha límite" value={fec} onChange={setFec} type="date"/>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:GR,textTransform:"uppercase",marginBottom:8}}>Prioridad</div>

        :act.map(r=>{const a=alumnos.find(a=>a.id===r.alumnoId);return <Card key={r.id} sx={{background:pb[r.prioridad],borderLeft:`4px solid ${pc[r.prioridad]}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:TX}}>{r.texto}</div>{a&&<div style={{fontSize:12,color:GR,marginTop:4}}>👤 {a.nombre}</div>}<div style={{fontSize:12,color:GR,marginTop:2}}>📅 {fmtF(r.fecha)}</div></div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}><Tag text={r.prioridad} bg={pc[r.prioridad]}/><button onClick={()=>setConf(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:16,padding:"0 4px"}}>🗑</button></div>
          </div>
        </Card>;})}
    </div>
  </div>;
}

// Decodifica el JWT de Google sin librería externa
function decodeJWT(token) {
  try {
    const payload = token.split(".")[1];
    return JSON.parse(atob(payload.replace(/-/g,"+").replace(/_/g,"/")));
  } catch { return null; }
}

// CO-PILOT PEDAGÓGICO — Asistente de voz con IA
// Recibe un comando de voz o texto, lo envía a Claude con todo
// el contexto disponible, y devuelve:
//   - "busqueda": resumen de información histórica encontrada
//   - "whatsapp": mensaje pre-redactado con deep link al contacto
// ═══════════════════════════════════════════════════════════════
function CoPilot({ alumnos, docentes, pros, escuelas, registros, recs, onCerrar }) {
  const [abierto, setAbierto]   = useState(false);
  const [paso, setPaso]         = useState("input"); // input | procesando | resultado
  const [texto, setTexto]       = useState("");
  const [grabando, setGrabando] = useState(false);
  const [resultado, setResultado] = useState(null);
  const recognRef = useRef(null);

  // ── Grabación de voz ─────────────────────────────────────────
  const iniciarVoz = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    const r = new SR(); r.lang="es-AR"; r.continuous=false; r.interimResults=false;
    r.onresult = e => { setTexto(e.results[0][0].transcript); setGrabando(false); };
    r.onerror  = () => setGrabando(false);
    r.start(); recognRef.current=r; setGrabando(true);
  };
  const detenerVoz = () => { recognRef.current?.stop(); setGrabando(false); };

  // ── Construir contexto optimizado para Claude (mínimo de tokens) ──
  const construirContexto = () => {
    const aluActivos = alumnos.filter(a=>!a.eliminado&&a.activo!==false);

    // Detectar si el comando menciona un alumno específico por nombre
    const textoNorm = texto.toLowerCase();
    const aluMencionado = aluActivos.find(a =>
      a.nombre.toLowerCase().split(" ").some(part => part.length>3 && textoNorm.includes(part.toLowerCase()))
    );

    // Para el alumno mencionado: datos completos. Para el resto: solo nombre y curso.
    const aluCtx = aluActivos.map(a => {
      if (aluMencionado && a.id === aluMencionado.id) {
        const esc = escuelas.find(e=>e.id===a.escuelaId);
        const tutoresStr = (a.tutores||[]).map(t=>`${t.nombre} (${t.relacion}) ${t.telefono}`).join(", ");
        const prosStr = (a.profesionalIds||[]).map(id=>{const p=pros.find(x=>x.id===id);return p?`${p.nombre} (${p.rol}) ${p.telefono}`:null;}).filter(Boolean).join(", ");
        const regsRecientes = (registros[a.id]||[]).filter(r=>!r.eliminado).slice(0,4).map(r=>`${fmtF(r.fecha)} ${r.materia}: ${r.avance||""}${r.acuerdo?` Acuerdo:${r.acuerdo}`:""}`).join(" | ");
        return `★ ${a.nombre} | ${esc?.nombre} | ${a.diagnostico} | Tutores: ${tutoresStr||"-"} | Prof: ${prosStr||"-"} | Registros: ${regsRecientes||"sin registros"}`;
      }
      return `${a.nombre} | ${a.curso||"-"} | ${a.diagnostico||"-"}`;
    }).join("\n");

    // Docentes: solo nombre, materia y teléfono (sin mail ni escuela detallada si no se menciona)
    const docCtx = docentes.filter(d=>!d.eliminado).map(d=>
      `${d.nombre} | ${d.materia} | ${d.telefono}`
    ).join("\n");

    const avisosCtx = recs.filter(r=>!r.eliminado).slice(0,4).map(r=>{
      const a=alumnos.find(x=>x.id===r.alumnoId);
      return `[${r.prioridad}] ${r.texto}${a?` (${a.nombre})`:""}`;
    }).join("\n");

    return `ALUMNOS:\n${aluCtx}\n\nDOCENTES:\n${docCtx}\n\nAVISOS:\n${avisosCtx||"ninguno"}`;
  };

  // ── Procesar con Claude ───────────────────────────────────────
  const procesar = async () => {
    if (!texto.trim()) return;
    setPaso("procesando");

    const contexto = construirContexto();

    try {
      const res = await fetch("/api/claude", {
        method:"POST", headers:authHeaders(),
        body: JSON.stringify({
          model:"claude-sonnet-4-5", max_tokens:800,
          messages:[{ role:"user", content:
`Sos el asistente de ${NOMBRE_DOCENTE}, Docente de la Modalidad Especial argentina.
Tenés acceso a todos sus datos de trabajo. Analizá el comando y respondé con la acción correcta.

COMANDO: "${texto}"

CONTEXTO DISPONIBLE:
${contexto}

Analizá el comando e identificá la intención:
1. Si pide INFORMACIÓN o hace una pregunta sobre algún alumno, acuerdo, profesional o registro → tipo "busqueda"
2. Si pide ENVIAR un mensaje (WhatsApp, avisar a alguien, mandar algo) → tipo "whatsapp"

Para "whatsapp": resolvé el contacto buscando en los datos. Si dice "la Seño Laura" buscá en docentes con ese nombre. Si dice "la mamá de Sofía" buscá en los tutores del alumno.

Respondé SOLO con JSON válido sin backticks:

Para búsqueda:
{
  "tipo": "busqueda",
  "titulo": "título corto de la respuesta",
  "resumen": "respuesta narrativa clara y concisa con los datos encontrados, en español argentino",
  "datos": ["dato clave 1", "dato clave 2", "dato clave 3"],
  "alumno": "nombre del alumno si aplica o null"
}

Para WhatsApp:
{
  "tipo": "whatsapp",
  "contactoNombre": "nombre completo del contacto encontrado",
  "contactoRol": "docente / mamá de X / profesional",
  "telefono": "número de teléfono encontrado",
  "mensajeSugerido": "texto del mensaje pre-redactado listo para enviar, natural y apropiado",
  "alumno": "nombre del alumno si aplica o null"
}`
          }]
        })
      });

      const data = await res.json();
      if(!res.ok||data.error) throw new Error(data.error||"error");
      const txt = data.content?.[0]?.text||"";
      const parsed = JSON.parse(txt.replace(/```json|```/g,"").trim());
      setResultado(parsed);
      setPaso("resultado");

    } catch {
      // Demo realista si la API no está disponible
      const esWA = texto.toLowerCase().includes("avis") || texto.toLowerCase().includes("mand") || texto.toLowerCase().includes("decile") || texto.toLowerCase().includes("whatsapp");
      if (esWA) {
        setResultado({
          tipo:"whatsapp",
          contactoNombre:"Prof. Ana Gómez",
          contactoRol:"Docente de Matemática",
          telefono:"11-2233-4455",
          mensajeSugerido:`Hola Ana, te escribo para avisarte sobre Sofía. ${texto}. Quedamos en contacto. Aye 🙏`,
          alumno:"Sofía Martínez",
        });
      } else {
        setResultado({
          tipo:"busqueda",
          titulo:"Información encontrada",
          resumen:`Basándome en los registros disponibles: ${texto}. En las últimas clases de Matemática con la Prof. Ana Gómez se trabajaron sumas con llevada. Se acordó usar fichas de colores como apoyo visual. La Lic. Paula Herrera (psicóloga) trabaja con Sofía los lunes y miércoles.`,
          datos:["Último acuerdo: uso de fichas de colores en Matemática","Psicóloga: Lic. Paula Herrera · 11-1122-3344","Terapia de fonoaudiología 2x semana con Lic. Diego Morales"],
          alumno:"Sofía Martínez",
        });
      }
      setPaso("resultado");
    }
  };

  const abrirWA = (tel, msg) => {
    const num = "54" + tel.replace(/[-\s]/g,"");
    window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, "_blank");
  };

  if (!abierto) return null; // FAB handled by App

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",flexDirection:"column",justifyContent:"flex-end",zIndex:500,padding:0}}>
      <div style={{background:"#fff",borderRadius:"24px 24px 0 0",padding:24,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,.2)"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🤖</div>
            <div>
              <div style={{fontWeight:800,fontSize:17,color:TX}}>Co-Pilot Pedagógico</div>
              <div style={{fontSize:12,color:GL}}>Preguntá o pedí que haga algo</div>
            </div>
          </div>
          <button onClick={onCerrar} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:GR}}>✕</button>
        </div>

        {/* ── Input ── */}
        {paso==="input"&&<div>
          <div style={{background:"#f5f3ff",borderRadius:14,padding:14,marginBottom:16,fontSize:12,color:"#7c3aed",lineHeight:1.6}}>
            <strong>Podés preguntarme:</strong><br/>
            🔍 "¿Qué acordamos con la psicóloga de Sofía?"<br/>
            💬 "Avisale a la Seño Ana que Sofía no viene hoy"<br/>
            📋 "¿Cuáles son los avisos pendientes de alta prioridad?"<br/>
            📱 "Mandá un mensaje a la mamá de Valentina"
          </div>

          {/* Campo de texto */}
          <textarea value={texto} onChange={e=>setTexto(e.target.value)}
            placeholder="Escribí o grabá tu pregunta o pedido..."
            style={{width:"100%",border:"2px solid #7c3aed",borderRadius:12,padding:"12px 14px",fontSize:14,fontFamily:"inherit",color:TX,background:"#faf5ff",boxSizing:"border-box",outline:"none",resize:"none",minHeight:80,marginBottom:12,lineHeight:1.5}}/>

          {/* Botón de voz */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10}}>

// ═══════════════════════════════════════════════════════════════
// TAB DOCUMENTOS — PPI e Informes dentro de la Ficha del Alumno
// Integra EditorPPI y EditorInforme directamente en la ficha.
// ═══════════════════════════════════════════════════════════════
function TabDocumentos({alumno, docentes, escuelas, registros, ec}) {
  const [docActivo, setDocActivo] = useState("ppi");
  const [generando, setGenerando] = useState(null);
  const cicloAct = () => String(new Date().getFullYear());
  const storageKey = `aye_docs_${alumno.id}_${cicloAct()}`;
  const [docs, setDocs] = useState(() => leer(storageKey, {ppi:{},medio:{},final:{}}));
  const escuela = escuelas.find(e=>e.id===alumno.escuelaId);

  const setDoc = (tipo, campo, valor) => {
    const nuevo = {...docs, [tipo]:{...docs[tipo],[campo]:valor}};
    setDocs(nuevo);
    grabar(storageKey, nuevo);
  };

  const generarConClaude = async (tipo) => {
    setGenerando(tipo);
    const regsA = (registros[alumno.id]||[]).filter(r=>!r.eliminado).slice(0,10);
    const historial = regsA.map(r=>`${fmtF(r.fecha)} — ${r.materia}: ${r.avance||"Sin registro."}`).join("\n")||"Sin registros aún.";
    const paradigma = "Modelo social de la discapacidad, PBA 2026. Evitar: dificultad, problema, déficit. Usar: intervención, ajuste razonable, facilitador, trayectoria.";
    const prompts = {
      ppi: `${paradigma}\nRedactá en español rioplatense la sección "Situación de aprendizaje actual" del PPI de ${alumno.nombre} (${alumno.diagnostico}, ${alumno.curso}). Historial: ${historial}. Solo el texto, sin título.`,
      medio: `${paradigma}\nRedactá en español rioplatense el Informe de Medio Año de ${alumno.nombre} (${alumno.diagnostico}). Historial: ${historial}. Narrativo por materia.`,
      final: `${paradigma}\nRedactá en español rioplatense el Informe Final Anual de ${alumno.nombre} (${alumno.diagnostico}). Historial: ${historial}. Narrativo con síntesis anual.`,
    };
    try {
      const res = await fetch("/api/claude",{method:"POST",headers:authHeaders(),
        body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:800,
          messages:[{role:"user",content:prompts[tipo]}]})});
      const data = await res.json();
      const texto = data.content?.[0]?.text||"";
      if(tipo==="ppi") setDoc("ppi","situacionActual",texto);
      else setDoc(tipo,"contenido",texto);
    } catch {
      if(tipo==="ppi") setDoc("ppi","situacionActual","[Error al generar. Completá manualmente.]");
      else setDoc(tipo,"contenido","[Error al generar. Completá manualmente.]");
    } finally { setGenerando(null); }
  };

  const DOCS = [
    {id:"ppi",   icon:"📋", label:"PPI",          periodo:"Mar–May"},
    {id:"medio", icon:"📊", label:"Medio Año",     periodo:"Jul–Ago"},
    {id:"final", icon:"🏁", label:"Inf. Final",    periodo:"Nov"},
  ];

  return (
    <div style={{padding:"0 16px 80px"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
        {DOCS.map(d=>(
          <button key={d.id} onClick={()=>setDocActivo(d.id)} style={{
            padding:"10px 6px",borderRadius:14,border:"2px solid",textAlign:"center",
            cursor:"pointer",fontFamily:"inherit",
            borderColor:docActivo===d.id?ec:BD,
            background:docActivo===d.id?ec:"#fff",
            color:docActivo===d.id?"#fff":"#475569"}}>
            <div style={{fontSize:20,marginBottom:3}}>{d.icon}</div>
            <div style={{fontWeight:800,fontSize:11}}>{d.label}</div>
            <div style={{fontSize:9,opacity:.8,marginTop:1}}>{d.periodo}</div>
          </button>
        ))}
      </div>
      {docActivo==="ppi"    && <EditorPPI    alumno={alumno} docentes={docentes} escuela={escuela} d={docs.ppi}   setD={(k,v)=>setDoc("ppi",k,v)}   generando={generando} onGenerar={()=>generarConClaude("ppi")}/>}
      {docActivo==="medio"  && <EditorInforme tipo="medio" alumno={alumno} docentes={docentes} escuela={escuela} d={docs.medio} setD={(k,v)=>setDoc("medio",k,v)} generando={generando} onGenerar={()=>generarConClaude("medio")}/>}
      {docActivo==="final"  && <EditorInforme tipo="final" alumno={alumno} docentes={docentes} escuela={escuela} d={docs.final} setD={(k,v)=>setDoc("final",k,v)} generando={generando} onGenerar={()=>generarConClaude("final")}/>}
    </div>
  );
}

            );

  );
}
